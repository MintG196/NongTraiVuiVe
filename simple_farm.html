<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 2D Farm Game</title>
    <style>
        @font-face {
            font-family: 'StardewValley';
            src: url('assets/fonts/Font/Stardew Valley.ttf') format('truetype');
        }
        
        #scene-indicator {
            position: absolute;
            top: 100px;
            left: 20px;
            color: #f1c40f;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            font-weight: bold;
            border: 1px solid #f1c40f;
            text-transform: uppercase;
        }

        body {
            background-color: #111;
            color: #ecf0f1;
            font-family: 'StardewValley', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Hide instructions for full screen mode */
        .instructions {
            display: none;
        }

        #game-container {
            position: relative;
            background-color: #000;
            display: inline-block;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            /* Disable anti-aliasing to keep pixel art crisp when scaling up */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: url('assets/Cursor/Normal%20Selects.cur'), auto;
        }

        /* UI overlay styles */
        #ui-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through the UI background to the canvas */
            box-sizing: border-box;
        }

        /* NEW STARDEW UI */
        /* NEW STARDEW UI */
        /* NEW STARDEW UI - 3X SCALE */
        #stardew-ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 216px; /* 72px * 3 */
            height: 126px; /* 42px * 3 */
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px; /* 131 * 3, 59 * 3 */
            background-position: 0 0;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            z-index: 100;
        }

        .ui-heart {
            position: absolute;
            width: 42px; /* 14px * 3 */
            height: 42px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px;
            image-rendering: pixelated;
            background-repeat: no-repeat;
        }

        #heart-left {
            top: 45px;
            left: 6px;
            background-position: -216px -90px; /* (72*3), (30*3) */
        }

        #heart-right {
            top: 45px;
            left: 168px;
            background-position: -216px -90px;
        }

        #ui-day-container {
            position: absolute;
            top: 17px;
            left: 60px;
            width: 108px;
            text-align: center;
            font-size: 25px;
            color: #3d2b1f;
            font-weight: bold;
        }

        #ui-stamina-container {
            position: absolute;
            top: 75px;
            left: 65px;
            width: 108px;
            text-align: center;
            font-size: 25px;
            color: #3d2b1f;
            font-weight: bold;
        }

        #stardew-money-panel {
            position: absolute;
            top: 129px; /* (43px * 3) */
            right: 0px;
            width: 216px;
            height: 48px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px;
            background-position: 0 -126px; /* (42px * 3) */
            image-rendering: pixelated;
            background-repeat: no-repeat;
        }

        #ui-money-digits {
            position: absolute;
            bottom: 3px;
            left: 30px;      /* Đã căn chỉnh chính xác 8 ô */
            width: 168px;    /* 8 ô * 21px */
            display: flex;
            gap: 0px;
        }

        .money-digit {
            width: 21px;
            height: 27px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: #3d2b1f;
            font-family: 'StardewValley', sans-serif;
        }

        /* House Menu (Sleep Dialog) */
        #house-menu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* Sử dụng ActualFrame.png kéo dãn để làm phẳng nền */
            border: 15px solid transparent; 
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;
            
            padding: 15px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 1000;
            font-family: 'StardewValley', sans-serif;
            color: #3d2b1f;
        }

        #house-menu h2 {
            margin-top: 0;
            font-size: 32px;
        }


        .stardew-button {
            /* Reset mặc định của button */
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            outline: none;
            border-radius: 0;
            
            display: inline-block;
            min-width: 100px;
            margin: 10px;
            padding: 8px 16px;
            
            /* Sử dụng khung gỗ kéo dãn cho nút bấm */
            border: 12px solid transparent; 
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;

            color: #3d2b1f;
            font-size: 24px;
            font-family: 'StardewValley', sans-serif;

            cursor: url('assets/Cursor/Link.cur'), pointer;
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        .stardew-button:hover {
            transform: scale(1.05);
        }

        .stardew-button:active {
            transform: scale(0.95);
        }

        #next-day-btn {
            /* Reset mặc định của button */
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            outline: none;
            border-radius: 0;

            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            
            /* Sử dụng khung gỗ đồng bộ */
            border: 12px solid transparent;
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;

            color: #3d2b1f;
            padding: 5px 15px;
            cursor: url('assets/Cursor/Link.cur'), pointer;
            font-family: 'StardewValley', sans-serif;
            font-size: 20px;
            transition: transform 0.1s;
        }

        #next-day-btn:hover {
            transform: scale(1.05);
        }

        #next-day-btn:active {
            transform: scale(0.95);
        }

        /* UI Overlays (Shop & Inventory) */
        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'StardewValley', sans-serif;
        }

        .stardew-panel {
            position: relative;
            width: 80%;
            max-width: 600px;
            
            /* Unified thick frame like Next Day button */
            border: 12px solid transparent;
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;
            background-color: transparent !important;
            
            /* Professional corner clipping */
            clip-path: polygon(
                4px 0%, calc(100% - 4px) 0%, 100% 4px, 100% calc(100% - 4px), 
                calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px
            );
            
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            color: #3d2b1f;
        }


        #shop-panel {
            width: 540px;
            height: 500px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }


        .shop-header {
            display: flex;
            gap: 20px;
            height: 300px;
        }


        .portrait-area {
            width: 120px;
            text-align: center;
        }

        .pierre-portrait {
            width: 96px;
            height: 96px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Non-Playable Characters - Pierre.png');
            background-size: 864px 336px; /* 576*1.5, 224*1.5 */
            background-position: -96px -48px; /* 64*1.5, 32*1.5 */
            border: 4px solid #3d2b1f;
            margin: 0 auto 10px auto;
            image-rendering: pixelated;
        }

        .item-list {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        /* Custom scrollbar for Stardew look */
        .item-list::-webkit-scrollbar {
            width: 8px;
        }
        .item-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        .item-list::-webkit-scrollbar-thumb {
            background: #d35400;
            border-radius: 4px;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            /* Match Next Day button style exactly */
            border: 10px solid transparent;
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;
            background-color: transparent !important;
            
            /* Clip corners to avoid background leakage */
            clip-path: polygon(
                3px 0%, calc(100% - 3px) 0%, 100% 3px, 100% calc(100% - 3px), 
                calc(100% - 3px) 100%, 3px 100%, 0% calc(100% - 3px), 0% 3px
            );

            padding: 2px 10px;
            margin-bottom: 6px;
            cursor: url('assets/Cursor/Link.cur'), pointer;
            font-size: 26px;
            transition: transform 0.1s, filter 0.1s;
        }


        
        .shop-item:hover { 
            filter: brightness(1.05);
            transform: scale(1.01);
            z-index: 5;
        }


        .item-icon {
            width: 32px;
            height: 32px;
            margin-right: 15px;
            image-rendering: pixelated;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #inventory-panel {
            width: 100%;
            border-top: 2px solid #3d2b1f;
            padding-top: 10px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 5px;
        }

        .inventory-slot {
            width: 40px;
            height: 40px;
            background-image: url('assets/inventoryframe.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: url('assets/Cursor/Link.cur'), pointer;
        }


        .slot-count {
            position: absolute;
            bottom: -2px;
            right: 2px;
            font-size: 12px;
            text-shadow: 1px 1px black;
            color: white;
        }

        .inventory-slot.selected-slot {
            border-color: #f1c40f;
            background: rgba(241, 196, 15, 0.3);
            box-shadow: inset 0 0 10px rgba(241, 196, 15, 0.5);
        }


        /* Toolbar using user's Toolbar.png */
        #toolbar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 105px;
            background-image: url('assets/Toolbar.png');
            background-size: 100% auto;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            /* Padding mới để vừa khít 6 ô, bù đắp cho ô thứ 7 bị khuyết ở bên phải */
            padding: 24px 90px 27px 31px; 
            box-sizing: border-box;
            z-index: 10;
        }

        .tool-slot {
            flex: 1;
            height: 100%;
            position: relative;
            cursor: url('assets/Cursor/Link.cur'), pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: none;
        }

        .tool-icon {
            /* Kích thước của icon bên trong (để vừa vặn với ô vuông 52x52 ở trên) */
            width: 48px; 
            height: 48px;
            image-rendering: pixelated;
            pointer-events: none; /* Let clicks pass to the slot */
            background-repeat: no-repeat;
        }

        /* Stardew Red Selection */
        .tool-slot.selected::after {
            content: '';
            position: absolute;
            /* Dùng top, left để di chuyển vị trí */
            top: var(--sel-top, -1px);
            left: var(--sel-left, 3.5px);
            /* Dùng width, height để giữ nguyên kích thước không bị co */
            width: var(--sel-width, calc(100% - 5px));
            height: var(--sel-height, calc(100% - 1px));
            
            border: 4px solid #d93c27;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
            border-radius: 4px;
            z-index: 2;
            pointer-events: none;
            box-sizing: border-box;
        }


        /* Shop Tooltip */
        #shop-tooltip {
            display: none;
            position: fixed;
            z-index: 3000;
            pointer-events: none;
            min-width: 220px;
            max-width: 300px;
            
            /* Match Next Day button style */
            border: 12px solid transparent;
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;
            background-color: transparent !important;

            /* Clip corners */
            clip-path: polygon(
                4px 0%, calc(100% - 4px) 0%, 100% 4px, 100% calc(100% - 4px), 
                calc(100% - 4px) 100%, 4px 100%, 0% calc(100% - 4px), 0% 4px
            );
            
            color: #3d2b1f;
            font-family: 'StardewValley', sans-serif;
            padding: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }



        
        /* Đảm bảo chữ không bị dính vào viền */
        .tooltip-title {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 2px solid rgba(61, 43, 31, 0.3);
            padding-bottom: 4px;
        }



        .tooltip-title {
            font-size: 25px;
            font-weight: bold;
            margin-bottom: 5px;
            border-bottom: 2px solid rgba(61, 43, 31, 0.2);
            padding-bottom: 2px;
        }

        .tooltip-desc {
            font-size: 25px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .tooltip-price {
            font-size: 25px;
            color: #d35400;
            /* font-weight: bold; */
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .gold-icon {
            width: 15px;
            height: 15px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px;
            background-position: -300px -126px; /* Gold coin icon position */
            display: inline-block;
        }
    </style>

</head>
<body>

    <div class="instructions"></div>

    <div id="game-container">
        <!-- Canvas where background and crops are drawn -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="scene-indicator">FARM</div>
        
        <!-- New Stardew Clock UI -->
        <div id="stardew-ui-container">
            <div id="heart-left" class="ui-heart"></div>
            <div id="heart-right" class="ui-heart"></div>
            <div id="ui-day-container">DAY: <span id="ui-day">1</span></div>
            <div id="ui-stamina-container">⚡<span id="ui-stamina">10</span>/<span id="ui-max-stamina">10</span></div>
            
            <div id="stardew-money-panel">
                <div id="ui-money-digits">
                    <!-- Digits will be generated by JS -->
                </div>
            </div>
        </div>

        <button id="next-day-btn">Next Day</button>

        <!-- House Menu (Stardew Sleep Dialog) -->
        <div id="house-menu">
            <h2>Đi ngủ để qua ngày ná?</h2>
            <button class="stardew-button" onclick="confirmSleep()">Coá</button>
            <button class="stardew-button" onclick="closeMenu()">Hong</button>
        </div>

        <!-- Toolbar using user's Toolbar.png -->
        <div id="toolbar-container">
            <!-- Slot 1: Hand / Seed -->
            <div class="tool-slot selected" data-tool="hand" title="Seed Bag (Plant/Harvest)" style="--sel-left: 3.5px; --sel-top: -3px;">
                <div id="seed-tool-icon" class="tool-icon" style="background-image: url('assets/Plant.png'); background-size: contain; background-position: center; transform: translate(-2px, -3px);"></div>
            </div>


            <!-- Slot 2: Watering Can -->
            <div class="tool-slot" data-tool="water" title="Watering Can" style="--sel-left: 5px; --sel-top: -3px;">
                <div class="tool-icon" style="background-image: url('assets/watering.png'); background-size: 1440px 960px; background-position:2px 0px;"></div>
            </div>
            <!-- Slot 3: Harvest Tool -->
            <div class="tool-slot" data-tool="harvest" title="Harvest Tool" style="--sel-left: 7px; --sel-top: -3px;">
                <div class="tool-icon" style="background-image: url('assets/Cursor/Text%20Select.png'); background-size: 48px 48px; background-position: 2px 0px;"></div>
            </div>
            <!-- Slot 4: Fertilizer -->
            <div class="tool-slot" data-tool="fertilizer" title="Speed-Gro Fertilizer" style="--sel-left: 12px; --sel-top: -2px;">
                <div class="tool-icon" style="background-image: url('assets/Fertilizer/Speedgro.png'); background-size: contain; background-position: center; transform: translate(10px, -3px);"></div>
                <div class="slot-count" id="toolbar-fertilizer-count" style="display: none;">0</div>
            </div>

            <div class="tool-slot"></div>
            <div class="tool-slot"></div>

        </div>

        <!-- Shop Overlay -->
        <div id="shop-overlay" class="overlay" onclick="if(event.target===this) closeShop()">
            <div id="shop-panel" class="stardew-panel">
                <div class="shop-header">
                    <div class="portrait-area">
                        <div class="pierre-portrait"></div>
                        <p style="font-size: 23px; margin: 0;">"Chào mừng quý khách đến với Pierre - Cửa hàng nông sản lớn nhất vùng!"</p>
                    </div>
                    <div class="item-list" id="shop-items-list">
                        <!-- Items generated by JS -->
                    </div>
                </div>
                
                <!-- Inventory integrated into shop panel -->
                <div id="inventory-panel">
                    <p style="margin: 0 0 5px 0; font-size: 16px; font-weight: bold;">Inventory</p>
                    <div class="inventory-grid" id="inventory-grid">
                        <!-- 36 slots -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Standalone Inventory Overlay (Tab) -->
        <div id="inventory-overlay" class="overlay" onclick="if(event.target===this) toggleInventory()">
            <div class="stardew-panel">
                <h2 style="margin: 0 0 15px 0;">INVENTORY</h2>
                <div class="inventory-grid" id="standalone-inventory-grid"></div>
            </div>
        </div>

        <div id="shop-tooltip">
            <div class="tooltip-title" id="tt-title">Crop Name</div>
            <div class="tooltip-desc" id="tt-desc">Description goes here...</div>
            <div id="tt-growth-info" style="font-size: 25px; color: #27ae60; margin-bottom: 5px;"></div>
            <div class="tooltip-price">
                Giá thu hoạch: <span id="tt-price">0</span> <div class="gold-icon"></div>
            </div>
        </div>



        <!-- Background Music -->
        <audio id="bg-music" loop src="assets/Music/1-02 Cloud Country.mp3"></audio>
    </div>

    <script>
        // ==========================================
        // GAME CONFIGURATION (EASY TO MODIFY)
        // ==========================================
        const GAME_CONFIG = {
            // Asset Paths
            bgImageSrc: 'assets/Map/Farm.png', 
            townImageSrc: 'assets/Map/Town.png', 
            houseImageSrc: 'assets/House/House.webp', // Giữ nguyên vì không thấy trong Map
            shopImageSrc: 'assets/Map/Shop.png',
            cropImageSrc: 'assets/Crops.png',
            chickenCoopImageSrc: 'assets/Map/ChickenCoop.png',


            // Transitions & Regions (unscaled pixels 576x320)
            transitions: {
                farmToTown: { x: 500, y: 0, w: 76, h: 320 },
                townToFarm: { x: 0, y: 0, w: 76, h: 320 },
                houseExit: { x: 200, y: 260, w: 176, h: 60 }, // Much larger exit zone
                shopExit: { x: 100, y: 290, w: 300, h: 30 },
                coopExit: { x: 100, y: 280, w: 400, h: 40 }
            },

            shopOnTown: { x: 300, y: 10, w: 180, h: 140 }, // Pierre's Shop area in town map
            houseOnFarm: { x: 300, y: 3, w: 150, h: 100 }, 
            chickenCoopOnFarm: { x: 50, y: 10, w: 120, h: 90 }, // Vị trí chuồng gà trên Farm
            bedInHouse: { x: 350, y: 180, w: 50, h: 80 }, 
            shopCounter: { x: 70, y: 60, w: 100, h: 60 }, // Thu nhỏ lại cho chính xác quầy Pierre
            shopBackpack: { x: 360, y: 130, w: 50, h: 60 }, // Khu vực túi đeo lưng trên kệ
            
            tools: {
                hand: { x: 0, y: 0, sprite: 'assets/Tool.png' },
                waterIdle: { x: 0, y: 0, sprite: 'assets/watering.png' },
                waterAnim: { x: 32, y: 0, sprite: 'assets/watering.png' },
                harvest: { x: 0, y: 0, sprite: 'assets/Cursor/Text Select.png' }
            },
            
            bgScale: 1, 
            plots: [
                { x: 240, y: 128 }, { x: 304, y: 128 }, { x: 368, y: 128 }, { x: 432, y: 128 },
                { x: 240, y: 192 }, { x: 304, y: 192 }, { x: 368, y: 192 }, { x: 432, y: 192 }
            ],

            crops: [
                // Spring Crops
                { id: 'parsnip', name: 'Củ Cải Vàng', price: 20, harvestPrice: 35, iconUrl: 'assets/Seedbag/parsnip.png', cropUrl: 'assets/Crops/Parsnip.png', daysToGrow: 5, grownIndex: 5, description: 'Một loại củ mọc nhanh, vị ngọt nhẹ.' },

        // Helper to update cursor based on current tool
        function updateCursor(toolId, isAnimating = false) {
            // Check for interactive label first
            const interactiveLabel = getInteractiveLabel();
            
            // forceKey: If we have an interactive label, use a special key
            const key = interactiveLabel ? `interactive_${interactiveLabel}` : `${toolId}_${isAnimating}_${state.selectedSeedIndex}`;
            if (key === lastCursorKey) return;
            lastCursorKey = key;

            if (interactiveLabel) {
                // Ưu tiên con trỏ bàn tay chỉ trỏ khi ở vùng tương tác
                const cursorUrl = 'assets/Cursor/Link.cur';
                document.body.style.cursor = `url('${cursorUrl}'), pointer`;
                canvas.style.cursor = `url('${cursorUrl}'), pointer`;
                return;
            }

            if (!toolId) {
                // Khôi phục con trỏ mặc định của game (Stardew Arrow)
                const defaultCursor = "url('assets/Cursor/Normal%20Selects.cur'), auto";
                document.body.style.cursor = defaultCursor;
                canvas.style.cursor = defaultCursor;
                return;
            }

            let tx = 0, ty = 0, spriteSrc = '', srcSize = 16, customImg = null;

            if (toolId === 'hand') {
                const validCropIds = GAME_CONFIG.crops.filter(c => c.type !== 'fertilizer').map(c => c.id);
                let selectedItem = state.inventory[state.selectedSeedIndex];
                
                if (!selectedItem || selectedItem.count <= 0 || !validCropIds.includes(selectedItem.id)) {
                    selectedItem = state.inventory.find(i => i && i.count > 0 && validCropIds.includes(i.id));
                }

                    customImg = new Image();
                    customImg.src = selectedItem.iconUrl;
                    srcSize = 16;
                } else {
                    customImg = new Image();
                    customImg.src = 'assets/Plant.png';
                    srcSize = 16;
                }
            } else if (toolId === 'water') {
                const config = isAnimating ? GAME_CONFIG.tools.waterAnim : GAME_CONFIG.tools.waterIdle;
                tx = config.x;
                ty = config.y;
                spriteSrc = config.sprite;
            } else if (toolId === 'harvest') {
                tx = GAME_CONFIG.tools.harvest.x;
                ty = GAME_CONFIG.tools.harvest.y;
                spriteSrc = GAME_CONFIG.tools.harvest.sprite;
                srcSize = 32;
            } else if (toolId === 'fertilizer') {
                customImg = new Image();
                customImg.src = 'assets/Fertilizer/Speedgro.png';
                srcSize = 16;
            }


            const drawCursor = (img, sx, sy, size) => {
                if (!img || !img.complete || img.naturalHeight === 0) {
                    setTimeout(() => {
                        lastCursorKey = ""; 
                        updateCursor(toolId, isAnimating);
                    }, 50);
                    return;
                }

                if (!window.cursorCanvas) {
                    window.cursorCanvas = document.createElement('canvas');
                    window.cursorCanvas.width = 48;
                    window.cursorCanvas.height = 48;
                    window.cursorCtx = window.cursorCanvas.getContext('2d');
                    window.cursorCtx.imageSmoothingEnabled = false;
                }

                window.cursorCtx.clearRect(0, 0, 48, 48);
                window.cursorCtx.drawImage(img, sx, sy, size, size, 0, 0, 48, 48);
                
                const cursorUrl = window.cursorCanvas.toDataURL('image/png');
                document.body.style.cursor = `url('${cursorUrl}') 24 24, auto`;
                canvas.style.cursor = `url('${cursorUrl}') 24 24, auto`;
            };

            if (customImg) {
                drawCursor(customImg, 0, 0, srcSize);
            } else {
                drawCursor(toolSprites[spriteSrc], tx, ty, srcSize);
            }
        }

        const REGIONS = {
            pond: { x: 75, y: 240, w: 30, h: 30 }

        function updateParticles() {
            if (state.currentScene !== 'farm') {
                activeParticles.length = 0; // Clear particles when not on farm
                return;
            }
            // Spawn water ripples - Reduced frequency (0.008)
            if (Math.random() < 0.008) {
                activeParticles.push({
                    type: 'ripple',
                    x: REGIONS.pond.x + Math.random() * REGIONS.pond.w,
                    y: REGIONS.pond.y + Math.random() * REGIONS.pond.h,
                    frame: 0, frameTimer: 0,
                    life: 80 // 8 frames * 10 ticks
                });
            }

            // Update existing particles
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                let p = activeParticles[i];
                p.life--;
                if (p.life <= 0) {
                    activeParticles.splice(i, 1);
                    continue;
                }

                if (p.type === 'ripple') {
                    p.frameTimer++;
                    if (p.frameTimer > 10) {
                        p.frameTimer = 0;
                        p.frame++;
                    }
                }
            }
        }

        function drawParticles(ctx) {
            for (let p of activeParticles) {
                if (p.type === 'ripple') {
                    if (p.frame < ANIM_CONFIG.rippleFrames.length && waterAnimImage.complete) {
                        let f = ANIM_CONFIG.rippleFrames[p.frame];
                        ctx.drawImage(waterAnimImage, f.x, f.y, 16, 16, p.x, p.y, 16, 16);
                    }
                }
            }
        }

        // ==========================================
        // ANIMAL SYSTEM
        // ==========================================
        class Animal {
            constructor(type, scene, x, y) {
                this.type = type; // 'chicken_brown', 'cow_brown', etc.
                this.scene = scene;
                this.x = x;
                this.y = y;
                this.targetX = x;
                this.targetY = y;
                this.speed = type.includes('chicken') ? 0.2 : 0.15;
                this.state = 'idle'; // 'idle', 'walking', 'eating'
                this.stateTimer = 0;
                this.frame = 0;
                this.frameTimer = 0;
                this.facing = 'right';
                
                // Config based on type
                this.isLarge = type.includes('cow');
                this.size = this.isLarge ? 32 : 16;
            }

            update() {
                this.stateTimer--;
                
                if (this.stateTimer <= 0) {
                    // Change state
                    const rand = Math.random();
                    if (rand < 0.6) {
                        this.state = 'idle';
                        this.stateTimer = 100 + Math.random() * 200;
                    } else if (rand < 0.9) {
                        this.state = 'walking';
                        this.stateTimer = 100 + Math.random() * 150;
                        // Pick new target - accounting for animal size to stay inside
                        const region = GAME_CONFIG.animalRegions[this.scene];
                        this.targetX = region.x + Math.random() * (region.w - this.size);
                        this.targetY = region.y + Math.random() * (region.h - this.size);
                    } else {
                        this.state = 'eating';
                        this.stateTimer = 150 + Math.random() * 100;
                    }
                }

                if (this.state === 'walking') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 1) {
                        this.x += (dx / dist) * this.speed;
                        this.y += (dy / dist) * this.speed;
                        this.facing = dx > 0 ? 'right' : 'left';
                    } else {
                        this.state = 'idle';
                    }
                }

                // Animation frames
                this.frameTimer++;
                if (this.frameTimer > 15) {
                    this.frameTimer = 0;
                    this.frame = (this.frame + 1) % 4;
                }
            }

            draw(ctx) {
                const img = animalSprites[this.type];
                if (!img || !img.complete) return;

                let srcX = 0;
                let srcY = 0;

                if (this.type.includes('chicken')) {
                    // Chicken layout: 16x16
                    if (this.state === 'walking') {
                        srcY = (this.facing === 'left' ? 3 : 1) * 16;
                        srcX = this.frame * 16;
                    } else if (this.state === 'eating') {
                        srcY = 4 * 16; 
                        srcX = this.frame * 16;
                    } else {
                        srcY = (this.facing === 'left' ? 2 : 0) * 16;
                        srcX = 0;
                    }
                } else {
                    // Cow layout: 32x32
                    if (this.state === 'walking') {
                        srcY = 1 * 32; // Row 1: Side/Right
                        srcX = this.frame * 32;
                    } else if (this.state === 'eating') {
                        srcY = 3 * 32;
                        srcX = this.frame * 32;
                    } else {
                        srcY = 0; // Front
                        srcX = 0;
                    }
                }

                // If facing left for cow, we'd need to flip the context
                if (!this.type.includes('chicken') && this.facing === 'left') {
                    ctx.save();
                    ctx.translate(this.x + this.size, this.y);
                    ctx.scale(-1, 1);
                    ctx.drawImage(img, srcX, srcY, this.size, this.size, 0, 0, this.size, this.size);
                    ctx.restore();
                } else {
                    ctx.drawImage(img, srcX, srcY, this.size, this.size, this.x, this.y, this.size, this.size);
                }
            }
        }

        function handlePatchClick(patch) {
            if (state.stamina < GAME_CONFIG.staminaCost) {
                alert("You are exhausted! Sleep in the house or click 'Next Day'.");
                return;
            }

            if (state.currentTool === 'hand') {
                if (patch.status === 'empty') {
                    // Lấy hạt giống đang được chọn
                    let selectedSeed = state.inventory[state.selectedSeedIndex];
                    
                    // Nếu chưa chọn hoặc hạt giống đã hết (hoặc là phân bón), tự động tìm hạt giống đầu tiên
                    const validCropIds = GAME_CONFIG.crops.filter(c => c.type !== 'fertilizer').map(c => c.id);
                    if (!selectedSeed || selectedSeed.count <= 0 || !validCropIds.includes(selectedSeed.id)) {
                        const firstSeedIdx = state.inventory.findIndex(i => i && i.count > 0 && validCropIds.includes(i.id));
                        if (firstSeedIdx !== -1) {
                            state.selectedSeedIndex = firstSeedIdx;
                            selectedSeed = state.inventory[firstSeedIdx];
                        }
                    }
                    
                    if (selectedSeed) {
                        patch.status = 'planted';
                        patch.daysPlanted = 0;
                        patch.harvestCount = 0;
                        patch.crop = { ...selectedSeed }; 
                        
                        selectedSeed.count--;
                        if (selectedSeed.count <= 0) {
                            state.inventory[state.selectedSeedIndex] = null;
                            
                            // Tự động tìm hạt giống tiếp theo ngay lập tức để cập nhật con trỏ chuột
                            const nextSeedIdx = state.inventory.findIndex(i => i && i.count > 0 && validCropIds.includes(i.id));
                            state.selectedSeedIndex = nextSeedIdx; 
                        }

                        playSFX('Plant');
                        state.stamina -= GAME_CONFIG.staminaCost;
                        updateUI();
                        renderInventory(state.isShopOpen ? 'inventory-grid' : 'standalone-inventory-grid');
                    } else {
                        alert("Bạn chưa chọn hạt giống hoặc không còn hạt giống nào!");
                    }
                } else if (patch.status === 'grown') {
                    // Allow harvesting with hand as well
                    harvestCrop(patch);
                }
            } else if (state.currentTool === 'fertilizer') {
                // Tìm phân bón trong túi đồ
                const fertItem = state.inventory.find(i => i && i.type === 'fertilizer');
                
                if (!fertItem || fertItem.count <= 0) {
                    alert("Bạn không có phân bón Speed-Gro trong túi đồ!");
                    return;
                }

                if (patch.status !== 'empty') {
                    alert("Chỉ có thể bón phân trước khi gieo hạt!");
                    return;
                }
                if (patch.isFertilized) {
                    alert("Ô đất này đã được bón phân rồi!");
                    return;
                }
                
                patch.isFertilized = true;
                fertItem.count--;
                // Nếu hết thì xóa khỏi túi đồ
                const fertIndex = state.inventory.findIndex(i => i === fertItem);
                if (fertItem.count <= 0) state.inventory[fertIndex] = null;
                
                playSFX('purchaseClick');
                state.stamina -= GAME_CONFIG.staminaCost;
                updateUI();
                renderInventory(state.isShopOpen ? 'inventory-grid' : 'standalone-inventory-grid');
            } else if (state.currentTool === 'harvest') {


                if (patch.status === 'grown') {
                    harvestCrop(patch);
                }
            } else if (state.currentTool === 'water') {
                // Play Watering Animation
                updateCursor('water', true);
                playSFX('water_lap2');
                setTimeout(() => {
                    updateCursor('water', false);
                }, 300); // 300ms animation

                if (!patch.isWatered) {
                    // Water the patch
                    patch.isWatered = true;
                    state.stamina -= GAME_CONFIG.staminaCost;
                    updateUI();
                }
            }
        }

        function harvestCrop(patch) {
            playSFX('Harvest');
            state.stamina -= GAME_CONFIG.staminaCost;
            
            // Get reward from crop data or fallback to global
            const reward = patch.crop.harvestPrice || GAME_CONFIG.harvestReward;
            state.money += reward;


            // Track harvest count
            patch.harvestCount = (patch.harvestCount || 0) + 1;

            if (patch.crop.regrowDays && (!patch.crop.maxHarvests || patch.harvestCount < patch.crop.maxHarvests)) {
                // Regrow logic: back to an earlier stage
                patch.status = 'planted';
                patch.daysPlanted = patch.crop.daysToGrow - patch.crop.regrowDays;
            } else {
                // Single harvest or reached max harvests
                patch.status = 'empty';
                patch.daysPlanted = 0;
                patch.crop = null;
                patch.isWatered = false;
                patch.isFertilized = false; // Thu hoạch xong thì mất phân bón
                patch.harvestCount = 0;
            }


            
            updateUI();
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function advanceDay() {
            state.day++;
            state.stamina = state.maxStamina;

            for (let patch of state.patches) {
                if (patch.status === 'planted' && patch.crop) {
                    if (patch.isWatered) {
                        // Nếu có phân bón, tăng trưởng nhanh hơn 1.5 lần (giảm ~33% thời gian)
                        // Chỉ có tác dụng ở giai đoạn lớn ban đầu, không tác dụng khi regrow
                        const isInitialGrowth = patch.harvestCount === 0;
                        const growthBoost = (patch.isFertilized && isInitialGrowth) ? 1.5 : 1;
                        
                        patch.daysPlanted += growthBoost;
                        
                        // Check if it has reached its full growth days
                        if (patch.daysPlanted >= patch.crop.daysToGrow) {
                            patch.status = 'grown';
                            patch.daysPlanted = patch.crop.daysToGrow; // Cap it
                        }
                    }
                }
                
                // Dirt dries out every night
                patch.isWatered = false;
            }

            updateUI();
            closeMenu();
        }

        function showTooltip(e, crop) {

        // ==========================================
        // RENDER LOOP
        // ==========================================
        function gameLoop(timestamp) {
            updateParticles(); // Update Stardew animations
            updateAnimals();   // Update Animal animations

            // Update interactive cursor
            const interactiveLabel = getInteractiveLabel();
            updateCursor(state.currentTool);



            // Reset transform and clear with a fallback background color (Stardew Green)
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#27ae60'; // Stardew Grass Green
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Apply game scaling
            ctx.scale(GAME_CONFIG.bgScale, GAME_CONFIG.bgScale);
            ctx.imageSmoothingEnabled = false;

            if (state.currentScene === 'farm') {
                if (bgImage.complete && bgImage.naturalHeight !== 0) {
                    ctx.drawImage(bgImage, 0, 0);
                }
                
                // Draw animations (leaves, ripples) over the background
                drawParticles(ctx);

                // Draw Farm Patches
                for (let patch of state.patches) {
                    // Draw Watered Dirt Background
                    if (patch.isWatered && dirtImageLoaded) {
                        for(let r=0; r<3; r++) {
                            for(let c=0; c<3; c++) {
                                let tx = patch.x + c * 16;
                                let ty = patch.y + r * 16;
                                let srcX = 16 + c * 16;
                                let srcY = 64 + r * 16;
                                ctx.drawImage(dirtImage, srcX, srcY, 16, 16, tx, ty, 16, 16);
                            }
                        }
                    }

                    // Vẽ lớp phân bón nếu có (Lặp 3x3 ô giống gieo hạt)
                    if (patch.isFertilized && fertilizerPlotImageLoaded) {
                        for(let r=0; r<3; r++) {
                            for(let c=0; c<3; c++) {
                                let tx = patch.x + c * 16;
                                let ty = patch.y + r * 16;
                                ctx.drawImage(fertilizerPlotImage, tx, ty, 16, 16);
                            }
                        }
                    }



                    // If planted or grown, draw the 3x3 crops
                    if (patch.status !== 'empty' && patch.crop) {
                        const specificCropImg = getCropImage(patch.crop);
                        
                        // Calculate which growth stage sprite to show
                        let spriteIndex = 0;
                        
                        // Safety: ONLY calculate if image is fully loaded to avoid script crashes
                        if (specificCropImg.complete && specificCropImg.width > 0) {
                            const framesInImage = Math.floor(specificCropImg.width / 16);
                            const maxFrame = framesInImage > 0 ? Math.min(patch.crop.grownIndex, framesInImage - 1) : patch.crop.grownIndex;

                            if (patch.status === 'grown') {
                                spriteIndex = maxFrame;
                            } else if (patch.harvestCount > 0 && patch.crop.regrowDays) {
                                // Nếu là cây đang mọc lại, ưu tiên dùng regrowIndex nếu có
                                spriteIndex = (patch.crop.regrowIndex !== undefined) ? patch.crop.regrowIndex : Math.max(0, maxFrame - 1);
                            } else {
                                const progress = patch.daysPlanted / patch.crop.daysToGrow;
                                spriteIndex = Math.floor(progress * maxFrame);
                                spriteIndex = Math.min(spriteIndex, maxFrame - 1);
                            }

                        } else {
                            // Fallback to a very early stage if image not yet ready
                            spriteIndex = 0;
                        }
                        
                        spriteIndex = Math.max(0, spriteIndex);
                        
                        let cropSpriteX = spriteIndex * 16;
                        let cropRowY = 0; // In individual files, growth stages are in the first row

                        for(let r=0; r<3; r++) {
                            for(let c=0; c<3; c++) {
                                let tx = patch.x + c * 16;
                                let ty = patch.y + r * 16;

                                if (specificCropImg.complete) {
                                    ctx.drawImage(
                                        specificCropImg,
                                        cropSpriteX, cropRowY, 16, 32, // Source
                                        tx, ty - 16, 16, 32            // Destination
                                    );
                                }
                            }
                        }
                    }

                    // Draw Hover Highlight over the entire 3x3 patch
                    if (!state.menuOpen && mouseX >= patch.x && mouseX <= patch.x + patch.width &&
                        mouseY >= patch.y && mouseY <= patch.y + patch.height) {
                        
                        if (placementImageLoaded) {
                            for(let r=0; r<3; r++) {
                                for(let c=0; c<3; c++) {
                                    let tx = patch.x + c * 16;
                                    let ty = patch.y + r * 16;
                                    ctx.drawImage(placementImage, 0, 0, 64, 64, tx, ty, 16, 16);
                                }
                            }
                        } else {
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            ctx.fillRect(patch.x, patch.y, patch.width, patch.height);
                        }
                    }

                    // Draw Growth Progress Text (Stardew Style)
                    if (patch.status !== 'empty' && patch.crop) {
                        if (patch.status === 'grown') {
                            // Animation logic for "Chín Ùi!"
                            const bounce = Math.sin(timestamp / 200) * 5; 
                            const pulse = 10 + Math.sin(timestamp / 100) * 2; 
                            
                            ctx.font = `${pulse}px StardewValley`;
                            ctx.textAlign = 'center';
                            ctx.fillStyle = '#f1c40f'; 
                            ctx.strokeStyle = '#3d2b1f';
                            ctx.lineWidth = 3;
                            
                            const text = 'Chín Ùi!';
                            ctx.strokeText(text, patch.x + 24, patch.y - 10 + bounce);
                            ctx.fillText(text, patch.x + 24, patch.y - 10 + bounce);
                        } else {
                            // Static progress text for growing crops
                            ctx.font = '14px StardewValley';
                            ctx.textAlign = 'center';
                            ctx.fillStyle = '#ffffff';
                            ctx.strokeStyle = '#3d2b1f';
                            ctx.lineWidth = 3;
                            
                            const text = `Day ${patch.daysPlanted}/${patch.crop.daysToGrow}`;
                            ctx.strokeText(text, patch.x + 24, patch.y - 10);
                            ctx.fillText(text, patch.x + 24, patch.y - 10);
                        }

                        ctx.textAlign = 'start';
                    }
                }

                // Draw House Hover Highlight (Farm)
                const h = GAME_CONFIG.houseOnFarm;
                if (!state.menuOpen && h && mouseX >= h.x && mouseX <= h.x + h.w &&
                    mouseY >= h.y && mouseY <= h.y + h.h) {
                    
                    ctx.fillStyle = 'rgba(241, 196, 15, 0.3)'; 
                    ctx.fillRect(h.x, h.y, h.w, h.h);
                    ctx.strokeStyle = '#f1c40f';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(h.x, h.y, h.w, h.h);
                }

                // Draw Chicken Coop Hover Highlight (Farm)
                const c = GAME_CONFIG.chickenCoopOnFarm;
                if (!state.menuOpen && c && mouseX >= c.x && mouseX <= c.x + c.w &&
                    mouseY >= c.y && mouseY <= c.y + c.h) {
                    
                    ctx.fillStyle = 'rgba(241, 196, 15, 0.3)'; 
                    ctx.fillRect(c.x, c.y, c.w, c.h);
                    ctx.strokeStyle = '#f1c40f';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(c.x, c.y, c.w, c.h);
                }

                // Draw Animals on Farm
                drawAnimals(ctx);
            } else if (state.currentScene === 'town') {
                if (townImageLoaded) {
                    ctx.drawImage(townImage, 0, 0);
                }
                // Highlight Shop on hover
                const shop = GAME_CONFIG.shopOnTown;
                if (!state.menuOpen && mouseX >= shop.x && mouseX <= shop.x + shop.w &&
                    mouseY >= shop.y && mouseY <= shop.y + shop.h) {
                    ctx.fillStyle = 'rgba(241, 196, 15, 0.3)';
                    ctx.fillRect(shop.x, shop.y, shop.w, shop.h);
                }
                
                // Draw Animals in Town
                drawAnimals(ctx);
            } else if (state.currentScene === 'shop') {
                // Centered shop rendering
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, 576, 320);
                
                if (shopImageLoaded) {
                    // Shop.png is 1792x1536
                    const sScale = 0.29; // To hơn
                    const dw = 1792 * sScale;
                    const dh = 1536 * sScale;
                    const dx = (576 - dw) / 2;
                    const dy = (320 - dh) / 2;
                    ctx.drawImage(shopImage, dx, dy, dw, dh);
                    
                    // Exit highlight
                    const exit = GAME_CONFIG.transitions.shopExit;
                    if (!state.menuOpen && mouseX >= exit.x && mouseX <= exit.x + exit.w &&
                        mouseY >= exit.y && mouseY <= exit.y + exit.h) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
                    }
                }
            } else if (state.currentScene === 'house') {
                // Stardew Style: Black background with centered house
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, 576, 320);
                
                if (houseImageLoaded) {
                    // House.webp is large (712x769)
                    const hScale = 0.35; // Quay lại như cũ
                    const dw = 712 * hScale;
                    const dh = 769 * hScale;
                    const dx = (576 - dw) / 2;
                    const dy = (320 - dh) / 2;
                    ctx.drawImage(houseImage, dx, dy, dw, dh);
                    
                    // Exit: door at the bottom
                    // Bed: right bottom area
                    // (Đã xóa đoạn code ghi đè để bạn có thể tự chỉnh trong GAME_CONFIG)

                    // Highlight bed on hover
                    if (!state.menuOpen && mouseX >= GAME_CONFIG.bedInHouse.x && mouseX <= GAME_CONFIG.bedInHouse.x + GAME_CONFIG.bedInHouse.w &&
                        mouseY >= GAME_CONFIG.bedInHouse.y && mouseY <= GAME_CONFIG.bedInHouse.y + GAME_CONFIG.bedInHouse.h) {
                        ctx.fillStyle = 'rgba(241, 196, 15, 0.3)';
                        ctx.fillRect(GAME_CONFIG.bedInHouse.x, GAME_CONFIG.bedInHouse.y, GAME_CONFIG.bedInHouse.w, GAME_CONFIG.bedInHouse.h);
                    }
                    
                    // Highlight exit on hover
                    if (!state.menuOpen && mouseX >= GAME_CONFIG.transitions.houseExit.x && mouseX <= GAME_CONFIG.transitions.houseExit.x + GAME_CONFIG.transitions.houseExit.w &&
                        mouseY >= GAME_CONFIG.transitions.houseExit.y && mouseY <= GAME_CONFIG.transitions.houseExit.y + GAME_CONFIG.transitions.houseExit.h) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(GAME_CONFIG.transitions.houseExit.x, GAME_CONFIG.transitions.houseExit.y, GAME_CONFIG.transitions.houseExit.w, GAME_CONFIG.transitions.houseExit.h);
                    }
                }
            } else if (state.currentScene === 'coop') {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, 576, 320);
                
                if (coopImageLoaded) {
                    const cScale = 1.5; // CHỈNH SỐ NÀY ĐỂ THAY ĐỔI ĐỘ TO/NHỎ
                    const dw = coopImage.width * cScale;
                    const dh = coopImage.height * cScale;
                    const dx = (576 - dw) / 2;
                    const dy = (320 - dh) / 2;
                    ctx.drawImage(coopImage, dx, dy, dw, dh);
                    
                    // Exit highlight
                    const exit = GAME_CONFIG.transitions.coopExit;
                    if (!state.menuOpen && mouseX >= exit.x && mouseX <= exit.x + exit.w &&
                        mouseY >= exit.y && mouseY <= exit.y + exit.h) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
                    }
                }
                
                // Draw Animals in Coop
                drawAnimals(ctx);
            }

            // Draw Interactive Label Tooltip (Drawn after scene and animals)
            if (interactiveLabel) {
                ctx.font = '14px StardewValley';
                ctx.textAlign = 'left';
                
                const textWidth = ctx.measureText(interactiveLabel).width;
                const textHeight = 14;
                const padding = 8;
                const frameW = textWidth + padding * 2;
                const frameH = textHeight + padding * 2;

                // Đặt sát đầu ngón tay (Link.cur có hotspot ở đầu ngón trỏ)
                let labelX = mouseX + 2;
                let labelY = mouseY + 2;
                
                // Giới hạn màn hình (576x320 là kích thước chuẩn của game)
                const gameW = 576;
                const gameH = 320;

                // Nếu chạm mép phải, đẩy sang trái con trỏ
                if (labelX + frameW > gameW) {
                    labelX = mouseX - frameW - 2;
                }
                // Nếu chạm mép dưới, đẩy lên trên con trỏ
                if (labelY + frameH > gameH) {
                    labelY = mouseY - frameH - 2;
                }


                if (infoFrameImageLoaded) {
                    const s = 4; // Corner size
                    const d = infoFrameImage.width; 
                    
                    ctx.drawImage(infoFrameImage, 0, 0, s, s, labelX, labelY, s, s);
                    ctx.drawImage(infoFrameImage, d-s, 0, s, s, labelX + frameW - s, labelY, s, s);
                    ctx.drawImage(infoFrameImage, 0, d-s, s, s, labelX, labelY + frameH - s, s, s);
                    ctx.drawImage(infoFrameImage, d-s, d-s, s, s, labelX + frameW - s, labelY + frameH - s, s, s);
                    ctx.drawImage(infoFrameImage, s, 0, d-2*s, s, labelX + s, labelY, frameW - 2*s, s);
                    ctx.drawImage(infoFrameImage, s, d-s, d-2*s, s, labelX + s, labelY + frameH - s, frameW - 2*s, s);
                    ctx.drawImage(infoFrameImage, 0, s, s, d-2*s, labelX, labelY + s, s, frameH - 2*s);
                    ctx.drawImage(infoFrameImage, d-s, s, s, d-2*s, labelX + frameW - s, labelY + s, s, frameH - 2*s);
                    ctx.drawImage(infoFrameImage, s, s, d-2*s, d-2*s, labelX + s, labelY + s, frameW - 2*s, frameH - 2*s);
                } else {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                    ctx.fillRect(labelX, labelY, frameW, frameH);
                }
                
                ctx.fillStyle = '#000000';
                ctx.fillText(interactiveLabel, labelX + padding, labelY + padding + 12);


                ctx.textAlign = 'start';
            }


            
            // Draw Cursor Highlight
            drawCursorHighlight();


            requestAnimationFrame(gameLoop);
        }

        updateUI();

    </script>
</body>
</html>
