<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 2D Farm Game</title>
    <style>
        @font-face {
            font-family: 'StardewValley';
            src: url('assets/fonts/Font/Stardew Valley.ttf') format('truetype');
        }
        
        #scene-indicator {
            position: absolute;
            top: 100px;
            left: 20px;
            color: #f1c40f;
            background: rgba(0,0,0,0.7);
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            font-weight: bold;
            border: 1px solid #f1c40f;
            text-transform: uppercase;
        }

        body {
            background-color: #111;
            color: #ecf0f1;
            font-family: 'StardewValley', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Hide instructions for full screen mode */
        .instructions {
            display: none;
        }

        #game-container {
            position: relative;
            background-color: #000;
            display: inline-block;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            /* Disable anti-aliasing to keep pixel art crisp when scaling up */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: url('assets/Cursor/Normal%20Selects.cur'), auto;
        }

        /* UI overlay styles */
        #ui-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through the UI background to the canvas */
            box-sizing: border-box;
        }

        /* NEW STARDEW UI */
        /* NEW STARDEW UI */
        /* NEW STARDEW UI - 3X SCALE */
        #stardew-ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 216px; /* 72px * 3 */
            height: 126px; /* 42px * 3 */
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px; /* 131 * 3, 59 * 3 */
            background-position: 0 0;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            z-index: 100;
        }

        .ui-heart {
            position: absolute;
            width: 42px; /* 14px * 3 */
            height: 42px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px;
            image-rendering: pixelated;
            background-repeat: no-repeat;
        }

        #heart-left {
            top: 45px;
            left: 6px;
            background-position: -216px -90px; /* (72*3), (30*3) */
        }

        #heart-right {
            top: 45px;
            left: 168px;
            background-position: -216px -90px;
        }

        #ui-day-container {
            position: absolute;
            top: 17px;
            left: 60px;
            width: 108px;
            text-align: center;
            font-size: 25px;
            color: #3d2b1f;
            font-weight: bold;
        }

        #ui-stamina-container {
            position: absolute;
            top: 75px;
            left: 65px;
            width: 108px;
            text-align: center;
            font-size: 25px;
            color: #3d2b1f;
            font-weight: bold;
        }

        #stardew-money-panel {
            position: absolute;
            top: 129px; /* (43px * 3) */
            right: 0px;
            width: 216px;
            height: 48px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Miscellaneous - Clock.png');
            background-size: 393px 177px;
            background-position: 0 -126px; /* (42px * 3) */
            image-rendering: pixelated;
            background-repeat: no-repeat;
        }

        #ui-money-digits {
            position: absolute;
            bottom: 6px;
            left: 30px;      /* Đã căn chỉnh chính xác 8 ô */
            width: 168px;    /* 8 ô * 21px */
            display: flex;
            gap: 0px;
        }

        .money-digit {
            width: 21px;
            height: 27px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 26px;
            color: #3d2b1f;
            font-family: 'StardewValley', sans-serif;
        }

        /* House Menu (Sleep Dialog) */
        #house-menu {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            /* Sử dụng ActualFrame.png kéo dãn để làm phẳng nền */
            border: 15px solid transparent; 
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;
            
            padding: 15px 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 1000;
            font-family: 'StardewValley', sans-serif;
            color: #3d2b1f;
        }

        #house-menu h2 {
            margin-top: 0;
            font-size: 28px;
        }

        .stardew-button {
            /* Reset mặc định của button */
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            outline: none;
            border-radius: 0;
            
            display: inline-block;
            min-width: 100px;
            margin: 10px;
            padding: 8px 16px;
            
            /* Sử dụng khung gỗ kéo dãn cho nút bấm */
            border: 12px solid transparent; 
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;

            color: #3d2b1f;
            font-size: 20px;
            font-family: 'StardewValley', sans-serif;
            cursor: pointer;
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        .stardew-button:hover {
            transform: scale(1.05);
        }

        .stardew-button:active {
            transform: scale(0.95);
        }

        #next-day-btn {
            /* Reset mặc định của button */
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            outline: none;
            border-radius: 0;

            position: absolute;
            bottom: 30px;
            right: 30px;
            z-index: 10;
            
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            
            /* Sử dụng khung gỗ đồng bộ */
            border: 12px solid transparent;
            border-image: url('assets/ActualFrame.png') 5 fill stretch;
            image-rendering: pixelated;

            color: #3d2b1f;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'StardewValley', sans-serif;
            font-size: 20px;
            transition: transform 0.1s;
        }

        #next-day-btn:hover {
            transform: scale(1.05);
        }

        #next-day-btn:active {
            transform: scale(0.95);
        }

        /* UI Overlays (Shop & Inventory) */
        .overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-family: 'StardewValley', sans-serif;
        }

        .stardew-panel {
            border: 12px solid transparent;
            border-image: url('assets/ActualFrame.png') 5 fill repeat;
            image-rendering: pixelated;
            padding: 20px;
            color: #3d2b1f;
            position: relative;
        }

        #shop-panel {
            width: 540px;
            height: 280px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-color: #fce1b4;
        }

        .shop-header {
            display: flex;
            gap: 20px;
            height: 140px;
        }

        .portrait-area {
            width: 120px;
            text-align: center;
        }

        .pierre-portrait {
            width: 96px;
            height: 96px;
            background-image: url('assets/PC _ Computer - Stardew Valley - Non-Playable Characters - Pierre.png');
            background-size: 864px 336px; /* 576*1.5, 224*1.5 */
            background-position: -96px -48px; /* 64*1.5, 32*1.5 */
            border: 4px solid #3d2b1f;
            margin: 0 auto 10px auto;
            image-rendering: pixelated;
        }

        .item-list {
            flex: 1;
            height: 120px;
            overflow-y: auto;
            background: rgba(0,0,0,0.05);
            padding: 5px;
            border: 2px solid #3d2b1f;
        }

        .shop-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 5px;
            border: 2px solid #3d2b1f;
            background: #fce1b4;
            cursor: pointer;
            font-size: 18px;
        }

        .shop-item:hover { background: #fdf2d5; }

        .item-icon {
            width: 32px;
            height: 32px;
            margin-right: 15px;
            image-rendering: pixelated;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #inventory-panel {
            width: 100%;
            border-top: 2px solid #3d2b1f;
            padding-top: 10px;
        }

        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 5px;
        }

        .inventory-slot {
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.1);
            border: 2px solid #3d2b1f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .slot-count {
            position: absolute;
            bottom: -2px;
            right: 2px;
            font-size: 12px;
            text-shadow: 1px 1px black;
            color: white;
        }

        /* Toolbar using user's Toolbar.png */
        #toolbar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 480px;
            height: 105px;
            background-image: url('assets/Toolbar.png');
            background-size: 100% auto;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            /* Padding mới để vừa khít 6 ô, bù đắp cho ô thứ 7 bị khuyết ở bên phải */
            padding: 24px 90px 27px 31px; 
            box-sizing: border-box;
            z-index: 10;
        }

        .tool-slot {
            flex: 1; /* Automatically spaces the 8 slots evenly */
            height: 100%;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: none;
        }

        .tool-icon {
            /* Kích thước của icon bên trong (để vừa vặn với ô vuông 52x52 ở trên) */
            width: 48px; 
            height: 48px;
            image-rendering: pixelated;
            pointer-events: none; /* Let clicks pass to the slot */
            background-repeat: no-repeat;
        }

        /* Stardew Red Selection */
        .tool-slot.selected::after {
            content: '';
            position: absolute;
            /* Thay đổi left và right để viền đỏ nhỏ lại, không lấn sang rãnh phân cách */
            top: -1px; left: 3.5px; right: 1.5px; bottom: 1px;
            border: 4px solid #d93c27;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
            border-radius: 4px; /* Bo góc nhẹ cho viền đỏ */
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="instructions"></div>

    <div id="game-container">
        <!-- Canvas where background and crops are drawn -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="scene-indicator">FARM</div>
        
        <!-- New Stardew Clock UI -->
        <div id="stardew-ui-container">
            <div id="heart-left" class="ui-heart"></div>
            <div id="heart-right" class="ui-heart"></div>
            <div id="ui-day-container">DAY: <span id="ui-day">1</span></div>
            <div id="ui-stamina-container">⚡<span id="ui-stamina">10</span>/<span id="ui-max-stamina">10</span></div>
            
            <div id="stardew-money-panel">
                <div id="ui-money-digits">
                    <!-- Digits will be generated by JS -->
                </div>
            </div>
        </div>

        <button id="next-day-btn">Next Day</button>

        <!-- House Menu (Stardew Sleep Dialog) -->
        <div id="house-menu">
            <h2>Đi ngủ để qua ngày ná?</h2>
            <button class="stardew-button" onclick="confirmSleep()">Coá</button>
            <button class="stardew-button" onclick="closeMenu()">Hong</button>
        </div>

        <!-- Toolbar using user's Toolbar.png -->
        <div id="toolbar-container">
            <!-- Slot 1: Hand / Seed -->
            <div class="tool-slot selected" data-tool="hand" title="Seed Bag (Plant/Harvest)">
                <div class="tool-icon" style="background-image: url('assets/Tool.png'); background-size: 1008px 1152px; background-position: 0px 0px;"></div>
            </div>
            <!-- Slot 2: Watering Can -->
            <div class="tool-slot" data-tool="water" title="Watering Can">
                <div class="tool-icon" style="background-image: url('assets/watering.png'); background-size: 1440px 960px; background-position: 0px 0px;"></div>
            </div>
            <!-- Slot 3: Harvest Tool -->
            <div class="tool-slot" data-tool="harvest" title="Harvest Tool">
                <div class="tool-icon" style="background-image: url('assets/Cursor/Text%20Select.png'); background-size: 48px 48px; background-position: center;"></div>
            </div>
            <div class="tool-slot"></div>
            <div class="tool-slot"></div>
            <div class="tool-slot"></div>
        </div>

        <!-- Shop Overlay -->
        <div id="shop-overlay" class="overlay" onclick="if(event.target===this) closeShop()">
            <div id="shop-panel" class="stardew-panel">
                <div class="shop-header">
                    <div class="portrait-area">
                        <div class="pierre-portrait"></div>
                        <p style="font-size: 14px; margin: 0;">"Welcome to Pierre's!"</p>
                    </div>
                    <div class="item-list" id="shop-items-list">
                        <!-- Items generated by JS -->
                    </div>
                </div>
                
                <!-- Inventory integrated into shop panel -->
                <div id="inventory-panel">
                    <p style="margin: 0 0 5px 0; font-size: 16px; font-weight: bold;">Inventory</p>
                    <div class="inventory-grid" id="inventory-grid">
                        <!-- 36 slots -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Standalone Inventory Overlay (Tab) -->
        <div id="inventory-overlay" class="overlay" onclick="if(event.target===this) toggleInventory()">
            <div class="stardew-panel">
                <h2 style="margin: 0 0 15px 0;">INVENTORY</h2>
                <div class="inventory-grid" id="standalone-inventory-grid"></div>
            </div>
        </div>

        <!-- Background Music -->
        <audio id="bg-music" loop src="assets/Music/1-02 Cloud Country.mp3"></audio>
    </div>

    <script>
        // ==========================================
        // GAME CONFIGURATION (EASY TO MODIFY)
        // ==========================================
        const GAME_CONFIG = {
            // Asset Paths
            bgImageSrc: 'assets/Farm.png', 
            townImageSrc: 'assets/Town.png', 
            houseImageSrc: 'assets/House/House.webp', 
            shopImageSrc: 'assets/Shop.png',
            cropImageSrc: 'assets/Crops.png',

            // Transitions & Regions (unscaled pixels 576x320)
            transitions: {
                farmToTown: { x: 500, y: 0, w: 76, h: 320 },
                townToFarm: { x: 0, y: 0, w: 76, h: 320 },
                houseExit: { x: 200, y: 260, w: 176, h: 60 }, // Much larger exit zone
                shopExit: { x: 100, y: 290, w: 300, h: 30 }
            },

            shopOnTown: { x: 300, y: 10, w: 180, h: 140 }, // Pierre's Shop area in town map

            houseOnFarm: { x: 440, y: 15, w: 110, h: 130 }, 
            bedInHouse: { x: 350, y: 180, w: 50, h: 80 }, 
            shopCounter: { x: 70, y: 60, w: 100, h: 60 }, // Thu nhỏ lại cho chính xác quầy Pierre
            shopBackpack: { x: 360, y: 130, w: 50, h: 60 }, // Khu vực túi đeo lưng trên kệ
            
            tools: {
                hand: { x: 0, y: 0, sprite: 'assets/Tool.png' },
                waterIdle: { x: 0, y: 0, sprite: 'assets/watering.png' },
                waterAnim: { x: 32, y: 0, sprite: 'assets/watering.png' },
                harvest: { x: 0, y: 0, sprite: 'assets/Cursor/Text Select.png' }
            },
            
            bgScale: 1, 
            plots: [
                { x: 240, y: 128 }, { x: 304, y: 128 }, { x: 368, y: 128 }, { x: 432, y: 128 },
                { x: 240, y: 192 }, { x: 304, y: 192 }, { x: 368, y: 192 }, { x: 432, y: 192 }
            ],

            crops: [
                // Spring Crops
                { id: 'parsnip', name: 'Parsnip Seeds', price: 20, iconUrl: 'assets/Seedbag/parsnip.png', cropUrl: 'assets/Crops/Parsnip.png', daysToGrow: 6, grownIndex: 5 },
                { id: 'cauliflower', name: 'Cauliflower Seeds', price: 80, iconUrl: 'assets/Seedbag/cauliflower.png', cropUrl: 'assets/Crops/cauliflower.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'potato', name: 'Potato Seeds', price: 50, iconUrl: 'assets/Seedbag/potato.png', cropUrl: 'assets/Crops/potato.png', daysToGrow: 10, grownIndex: 9 },
                { id: 'garlic', name: 'Garlic Seeds', price: 40, iconUrl: 'assets/Seedbag/garlic.png', cropUrl: 'assets/Crops/garlic.png', daysToGrow: 6, grownIndex: 5 },
                { id: 'rhubarb', name: 'Rhubarb Seeds', price: 100, iconUrl: 'assets/Seedbag/rhubarb.png', cropUrl: 'assets/Crops/rhubarb.png', daysToGrow: 8, grownIndex: 7 },
                { id: 'greenbean', name: 'Green Bean Seeds', price: 60, iconUrl: 'assets/Seedbag/greenbean.png', cropUrl: 'assets/Crops/greenbean.png', daysToGrow: 8, grownIndex: 7 },
                { id: 'strawberry', name: 'Strawberry Seeds', price: 60, iconUrl: 'assets/Seedbag/strawberry.png', cropUrl: 'assets/Crops/strawberry.png', daysToGrow: 8, grownIndex: 7 },
                // Summer Crops
                { id: 'blueberry', name: 'Blueberry Seeds', price: 80, iconUrl: 'assets/Seedbag/blueberry.png', cropUrl: 'assets/Crops/blueberry.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'melon', name: 'Melon Seeds', price: 80, iconUrl: 'assets/Seedbag/melon.png', cropUrl: 'assets/Crops/melon.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'corn', name: 'Corn Seeds', price: 150, iconUrl: 'assets/Seedbag/corn.png', cropUrl: 'assets/Crops/corn.png', daysToGrow: 13, grownIndex: 12 },
                { id: 'hotpepper', name: 'Hot Pepper Seeds', price: 60, iconUrl: 'assets/Seedbag/hotpepper.png', cropUrl: 'assets/Crops/hotpepper.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'starfruit', name: 'Starfruit Seeds', price: 200, iconUrl: 'assets/Seedbag/starfruit.png', cropUrl: 'assets/Crops/starfruit.png', daysToGrow: 8, grownIndex: 7 },
                { id: 'eggplant', name: 'Eggplant Seeds', price: 20, iconUrl: 'assets/Seedbag/eggplant.png', cropUrl: 'assets/Crops/eggplant.png', daysToGrow: 11, grownIndex: 10 },
                { id: 'tomato', name: 'Tomato Seeds', price: 50, iconUrl: 'assets/Seedbag/Tomato.png', cropUrl: 'assets/Crops/tomato.png', daysToGrow: 13, grownIndex: 12, regrowDays: 4 },
                { id: 'sunflower', name: 'Sunflower Seeds', price: 200, iconUrl: 'assets/Seedbag/sunflower.png', cropUrl: 'assets/Crops/sunflower.png', daysToGrow: 10, grownIndex: 9 },
                { id: 'pumpkin', name: 'Pumpkin Seeds', price: 100, iconUrl: 'assets/Seedbag/pumpkin.png', cropUrl: 'assets/Crops/pumpkin.png', daysToGrow: 10, grownIndex: 9 },
                { id: 'wheat', name: 'Wheat Seeds', price: 10, iconUrl: 'assets/Seedbag/wheat.png', cropUrl: 'assets/Crops/wheat.png', daysToGrow: 8, grownIndex: 7 },
                { id: 'cranberries', name: 'Cranberry Seeds', price: 240, iconUrl: 'assets/Seedbag/cranberries.png', cropUrl: 'assets/Crops/cranberries.png', daysToGrow: 12, grownIndex: 11 },
                // Fall Crops
                { id: 'bokchoy', name: 'Bok Choy Seeds', price: 50, iconUrl: 'assets/Seedbag/bokchoy.png', cropUrl: 'assets/Crops/bokchoy.png', daysToGrow: 7, grownIndex: 6 },
                { id: 'carrot', name: 'Carrot Seeds', price: 20, iconUrl: 'assets/Seedbag/carrot.png', cropUrl: 'assets/Crops/carrot.png', daysToGrow: 10, grownIndex: 9 },
                { id: 'radish', name: 'Radish Seeds', price: 40, iconUrl: 'assets/Seedbag/radish.png', cropUrl: 'assets/Crops/radish.png', daysToGrow: 7, grownIndex: 6 },
                { id: 'redcabbage', name: 'Red Cabbage Seeds', price: 100, iconUrl: 'assets/Seedbag/redcabbage.png', cropUrl: 'assets/Crops/redcabbage.png', daysToGrow: 9, grownIndex: 8 },
                { id: 'yam', name: 'Yam Seeds', price: 60, iconUrl: 'assets/Seedbag/yam.png', cropUrl: 'assets/Crops/yam.png', daysToGrow: 10, grownIndex: 9 },
                // Other Crops
                { id: 'beet', name: 'Beet Seeds', price: 20, iconUrl: 'assets/Seedbag/beet.png', cropUrl: 'assets/Crops/beet.png', daysToGrow: 10, grownIndex: 9 },
                { id: 'pineapple', name: 'Pineapple Seeds', price: 200, iconUrl: 'assets/Seedbag/pineapple.png', cropUrl: 'assets/Crops/pineapple.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'giantpumpkin', name: 'Giant Pumpkin Seeds', price: 150, iconUrl: 'assets/Seedbag/pumpkin.png', cropUrl: 'assets/Crops/giantpumpkin.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'giantcauliflower', name: 'Giant Cauliflower Seeds', price: 150, iconUrl: 'assets/Seedbag/cauliflower.png', cropUrl: 'assets/Crops/giantcauliflower.png', daysToGrow: 12, grownIndex: 11 },
                { id: 'giantmelon', name: 'Giant Melon Seeds', price: 150, iconUrl: 'assets/Seedbag/melon.png', cropUrl: 'assets/Crops/giantmelon.png', daysToGrow: 13, grownIndex: 12 }
            ],

            harvestReward: 15,
            staminaCost: 1
        };

        // ==========================================
        // GAME STATE
        // ==========================================
        const state = {
            day: 1,
            money: 1000,
            stamina: 10,
            maxStamina: 10,
            patches: [], 
            inventory: Array(36).fill(null), // 36 slots
            isShopOpen: false,
            isInventoryOpen: false,
            menuOpen: false,
            currentTool: 'hand', // 'hand' or 'water'
            currentScene: 'farm' // 'farm' or 'town'
        };

        // Initialize the 8 farming patches
        GAME_CONFIG.plots.forEach((pos, index) => {
            state.patches.push({
                id: index,
                x: pos.x,
                y: pos.y,
                width: 48, // 3 tiles * 16px
                height: 48, // 3 tiles * 16px
                status: 'empty', // 'empty' | 'planted' | 'grown'
                daysPlanted: 0,
                isWatered: false,
                crop: null // Will store the selected crop object from GAME_CONFIG.crops
            });
        });

        // ==========================================
        // AUDIO & MUSIC
        // ==========================================
        const bgMusic = document.getElementById('bg-music');
        let musicStarted = false;

        function startMusic() {
            if (!musicStarted && bgMusic) {
                bgMusic.play().catch(e => console.log("Music autoplay blocked, waiting for interaction."));
                musicStarted = true;
            }
        }

        // Hàm phát âm thanh hiệu ứng (SFX)
        function playSFX(name) {
            const sfx = new Audio(`assets/SFX/${name}.wav`);
            sfx.volume = 0.6; // Âm lượng vừa phải
            sfx.play().catch(e => {}); // Bỏ qua nếu bị block
        }

        window.addEventListener('click', startMusic, { once: true });

        // Key Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                toggleInventory();
            }
        });

        function toggleInventory() {
            if (state.isShopOpen) return; // Don't toggle standalone inventory if shop is open
            state.isInventoryOpen = !state.isInventoryOpen;
            const overlay = document.getElementById('inventory-overlay');
            overlay.style.display = state.isInventoryOpen ? 'flex' : 'none';
            if (state.isInventoryOpen) renderInventory('standalone-inventory-grid');
        }

        function openShop() {
            state.isShopOpen = true;
            document.getElementById('shop-overlay').style.display = 'flex';
            renderShopItems();
            renderInventory('inventory-grid');
        }

        function closeShop() {
            state.isShopOpen = false;
            document.getElementById('shop-overlay').style.display = 'none';
        }

        function renderShopItems() {
            const list = document.getElementById('shop-items-list');
            list.innerHTML = '';
            GAME_CONFIG.crops.forEach(crop => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item';
                itemDiv.onclick = () => buyItem(crop);
                itemDiv.innerHTML = `
                    <div style="display: flex; align-items: center;">
                        <div class="item-icon" style="background-image: url('${crop.iconUrl}')"></div>
                        <span>${crop.name}</span>
                    </div>
                    <span>${crop.price}G</span>
                `;
                list.appendChild(itemDiv);
            });
        }

        function renderInventory(containerId) {
            const grid = document.getElementById(containerId);
            grid.innerHTML = '';
            state.inventory.forEach((item, index) => {
                const slot = document.createElement('div');
                slot.className = 'inventory-slot';
                if (item) {
                    slot.innerHTML = `
                        <div class="item-icon" style="background-image: url('${item.iconUrl}'); margin-right: 0;"></div>
                        <div class="slot-count">${item.count}</div>
                    `;
                }
                grid.appendChild(slot);
            });
        }

        function buyItem(crop) {
            if (state.money >= crop.price) {
                state.money -= crop.price;
                playSFX('purchaseClick');
                addToInventory(crop);
                updateUI();
                renderInventory(state.isShopOpen ? 'inventory-grid' : 'standalone-inventory-grid');
            } else {
                alert("Not enough money!");
            }
        }

        function addToInventory(crop) {
            // Check if item already exists
            const existing = state.inventory.find(i => i && i.id === crop.id);
            if (existing) {
                existing.count++;
            } else {
                // Find first empty slot
                const emptyIndex = state.inventory.findIndex(i => i === null);
                if (emptyIndex !== -1) {
                    state.inventory[emptyIndex] = { ...crop, count: 1 };
                }
            }
        }

        // ==========================================
        // SETUP CANVAS & ASSETS
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.imageSmoothingEnabled = false;

        const bgImage = new Image();
        // src will be set later to avoid race conditions with onload

        const cropImage = new Image();
        cropImage.src = GAME_CONFIG.cropImageSrc;

        // Load tool sprites globally
        const toolSprites = {};
        ['assets/Tool.png', 'assets/watering.png', 'assets/Cursor/Text Select.png'].forEach(src => {
            const img = new Image();
            img.src = src;
            toolSprites[src] = img;
        });

        const cropImageCache = new Map();

        function getCropImage(crop) {
            if (cropImageCache.has(crop.id)) {
                return cropImageCache.get(crop.id);
            }
            const img = new Image();
            img.src = crop.cropUrl;
            img.onload = () => {
                // Image will be ready for the next frame
            };
            cropImageCache.set(crop.id, img);
            return img;
        }

        // Preload initial crop images
        GAME_CONFIG.crops.forEach(crop => getCropImage(crop));

        let cropImageLoaded = false; // Keep for legacy if needed, but we use the cache now

        const dirtImage = new Image();
        dirtImage.src = 'assets/Dirt.png';
        let dirtImageLoaded = false;
        dirtImage.onload = () => { dirtImageLoaded = true; };

        // Helper to update cursor based on current tool
        function updateCursor(toolId, isAnimating = false) {
            if (!toolId) {
                // Khôi phục con trỏ chuột bình thường nếu không cầm công cụ
                document.body.style.cursor = '';
                canvas.style.cursor = '';
                return;
            }

            let tx, ty, spriteSrc;
            if (toolId === 'hand') {
                tx = GAME_CONFIG.tools.hand.x;
                ty = GAME_CONFIG.tools.hand.y;
                spriteSrc = GAME_CONFIG.tools.hand.sprite;
            } else if (toolId === 'water') {
                const config = isAnimating ? GAME_CONFIG.tools.waterAnim : GAME_CONFIG.tools.waterIdle;
                tx = config.x;
                ty = config.y;
                spriteSrc = config.sprite;
            } else if (toolId === 'harvest') {
                tx = GAME_CONFIG.tools.harvest.x;
                ty = GAME_CONFIG.tools.harvest.y;
                spriteSrc = GAME_CONFIG.tools.harvest.sprite;
            }
            const sprite = toolSprites[spriteSrc];
            if (!sprite || !sprite.complete || sprite.naturalHeight === 0) return;

            // Create offscreen canvas for cursor if it doesn't exist
            if (!window.cursorCanvas) {
                window.cursorCanvas = document.createElement('canvas');
                window.cursorCanvas.width = 48; // Scaled cursor size
                window.cursorCanvas.height = 48;
                window.cursorCtx = window.cursorCanvas.getContext('2d');
                window.cursorCtx.imageSmoothingEnabled = false;
            }

            // Define source size (16 for normal tools, 32 for harvest cursor)
            const srcSize = toolId === 'harvest' ? 32 : 16;

            // Clear and draw the sprite scaled up
            window.cursorCtx.clearRect(0, 0, 48, 48);
            window.cursorCtx.drawImage(sprite, tx, ty, srcSize, srcSize, 0, 0, 48, 48);
            
            const cursorUrl = window.cursorCanvas.toDataURL('image/png');
            document.body.style.cursor = `url('${cursorUrl}') 0 0, auto`;
            canvas.style.cursor = `url('${cursorUrl}') 0 0, auto`;
        }
        
        function resizeGame() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const imgW = 576; // Original map width
            const imgH = 320; // Original map height (Khớp với Farm.png và Town.png)
            
            // Calculate scale to maximize canvas size while fitting in the window
            GAME_CONFIG.bgScale = Math.min(winW / imgW, winH / imgH);
            
            canvas.width = imgW * GAME_CONFIG.bgScale;
            canvas.height = imgH * GAME_CONFIG.bgScale;
            
            // Reset transform and apply scaling
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.imageSmoothingEnabled = false;
            ctx.scale(GAME_CONFIG.bgScale, GAME_CONFIG.bgScale);
        }

        const townImage = new Image();
        townImage.src = GAME_CONFIG.townImageSrc;
        let townImageLoaded = false;
        townImage.onload = () => { townImageLoaded = true; };
        
        const houseImage = new Image();
        houseImage.src = GAME_CONFIG.houseImageSrc;
        let houseImageLoaded = false;
        houseImage.onload = () => { houseImageLoaded = true; };

        const shopImage = new Image();
        shopImage.src = GAME_CONFIG.shopImageSrc;
        let shopImageLoaded = false;
        shopImage.onload = () => { shopImageLoaded = true; };

        bgImage.onload = () => {
            resizeGame();
            window.addEventListener('resize', resizeGame);
            requestAnimationFrame(gameLoop);
        };
        bgImage.src = GAME_CONFIG.bgImageSrc;

        bgImage.onerror = () => {
            console.error("Could not load background image: " + GAME_CONFIG.bgImageSrc);
            resizeGame();
            requestAnimationFrame(gameLoop);
        };

        const placementImage = new Image();
        placementImage.src = 'assets/placement_tiles.png';
        let placementImageLoaded = false;
        placementImage.onload = () => { placementImageLoaded = true; };

        // ==========================================
        // ANIMATION SYSTEM (Stardew Valley Style)
        // ==========================================
        const animImage = new Image();
        animImage.src = 'assets/Anim.png';

        const waterAnimImage = new Image();
        waterAnimImage.src = 'assets/wateranim.png';

        const activeParticles = [];

        const ANIM_CONFIG = {
            rippleFrames: [
                {x: 0, y: 0}, {x: 16, y: 0}, {x: 32, y: 0}, {x: 48, y: 0}, 
                {x: 64, y: 0}, {x: 80, y: 0}, {x: 96, y: 0}, {x: 112, y: 0}
            ]
        };

        // Coordinates optimized for the background map 'Farm.png'
        const REGIONS = {
            pond: { x: 75, y: 240, w: 30, h: 30 }
        };

        function updateParticles() {
            if (state.currentScene !== 'farm') {
                activeParticles.length = 0; // Clear particles when not on farm
                return;
            }
            // Spawn water ripples - Reduced frequency (0.008)
            if (Math.random() < 0.008) {
                activeParticles.push({
                    type: 'ripple',
                    x: REGIONS.pond.x + Math.random() * REGIONS.pond.w,
                    y: REGIONS.pond.y + Math.random() * REGIONS.pond.h,
                    frame: 0, frameTimer: 0,
                    life: 80 // 8 frames * 10 ticks
                });
            }

            // Update existing particles
            for (let i = activeParticles.length - 1; i >= 0; i--) {
                let p = activeParticles[i];
                p.life--;
                if (p.life <= 0) {
                    activeParticles.splice(i, 1);
                    continue;
                }

                if (p.type === 'ripple') {
                    p.frameTimer++;
                    if (p.frameTimer > 10) {
                        p.frameTimer = 0;
                        p.frame++;
                    }
                }
            }
        }

        function drawParticles(ctx) {
            for (let p of activeParticles) {
                if (p.type === 'ripple') {
                    if (p.frame < ANIM_CONFIG.rippleFrames.length && waterAnimImage.complete) {
                        let f = ANIM_CONFIG.rippleFrames[p.frame];
                        ctx.drawImage(waterAnimImage, f.x, f.y, 16, 16, p.x, p.y, 16, 16);
                    }
                }
            }
        }

        // ==========================================
        // INPUT HANDLING
        // ==========================================
        let mouseX = -1;
        let mouseY = -1;

        canvas.addEventListener('mousemove', (e) => {
            if (state.menuOpen) return;
            const rect = canvas.getBoundingClientRect();
            // Cần tính toán lại tọa độ dựa trên tỷ lệ thực tế của canvas trên màn hình
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = ((e.clientX - rect.left) * scaleX) / GAME_CONFIG.bgScale;
            mouseY = ((e.clientY - rect.top) * scaleY) / GAME_CONFIG.bgScale;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1;
            mouseY = -1;
        });

        canvas.addEventListener('click', (e) => {
            if (state.menuOpen) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clickX = ((e.clientX - rect.left) * scaleX) / GAME_CONFIG.bgScale;
            const clickY = ((e.clientY - rect.top) * scaleY) / GAME_CONFIG.bgScale;

            // Check Transitions
            if (state.currentScene === 'farm') {
                const trans = GAME_CONFIG.transitions.farmToTown;
                if (clickX >= trans.x && clickX <= trans.x + trans.w &&
                    clickY >= trans.y && clickY <= trans.y + trans.h) {
                    state.currentScene = 'town';
                    activeParticles.length = 0;
                    updateUI();
                    return;
                }
                
                // Check House Entry
                const house = GAME_CONFIG.houseOnFarm;
                if (clickX >= house.x && clickX <= house.x + house.w &&
                    clickY >= house.y && clickY <= house.y + house.h) {
                    state.currentScene = 'house';
                    playSFX('doorOpen');
                    updateUI();
                    return;
                }
            } else if (state.currentScene === 'town') {
                const trans = GAME_CONFIG.transitions.townToFarm;
                if (clickX >= trans.x && clickX <= trans.x + trans.w &&
                    clickY >= trans.y && clickY <= trans.y + trans.h) {
                    state.currentScene = 'farm';
                    updateUI();
                    return;
                }
                // Check Shop Entry
                const shop = GAME_CONFIG.shopOnTown;
                if (clickX >= shop.x && clickX <= shop.x + shop.w &&
                    clickY >= shop.y && clickY <= shop.y + shop.h) {
                    state.currentScene = 'shop';
                    playSFX('doorOpen');
                    updateUI();
                    return;
                }
            } else if (state.currentScene === 'shop') {
                // Check Shop Counter FIRST
                const counter = GAME_CONFIG.shopCounter;
                if (clickX >= counter.x && clickX <= counter.x + counter.w &&
                    clickY >= counter.y && clickY <= counter.y + counter.h) {
                    openShop();
                    return;
                }

                // Check Shop Backpack (Inventory)
                const backpack = GAME_CONFIG.shopBackpack;
                if (clickX >= backpack.x && clickX <= backpack.x + backpack.w &&
                    clickY >= backpack.y && clickY <= backpack.y + backpack.h) {
                    toggleInventory();
                    return;
                }

                // Exit shop SECOND
                const trans = GAME_CONFIG.transitions.shopExit;
                if (clickX >= trans.x && clickX <= trans.x + trans.w &&
                    clickY >= trans.y && clickY <= trans.y + trans.h) {
                    state.currentScene = 'town';
                    playSFX('doorClose');
                    updateUI();
                    return;
                }
            } else if (state.currentScene === 'house') {
                // Exit house
                const trans = GAME_CONFIG.transitions.houseExit;
                if (clickX >= trans.x && clickX <= trans.x + trans.w &&
                    clickY >= trans.y && clickY <= trans.y + trans.h) {
                    state.currentScene = 'farm';
                    playSFX('doorClose');
                    updateUI();
                    return;
                }
                // Click bed to sleep
                const bed = GAME_CONFIG.bedInHouse;
                if (clickX >= bed.x && clickX <= bed.x + bed.w &&
                    clickY >= bed.y && clickY <= bed.y + bed.h) {
                    openMenu();
                    return;
                }
            }

            // Check Farm Patch Clicks (Only on Farm)
            if (state.currentScene === 'farm') {
                for (let patch of state.patches) {
                    if (clickX >= patch.x && clickX <= patch.x + patch.width &&
                        clickY >= patch.y && clickY <= patch.y + patch.height) {
                        handlePatchClick(patch);
                        return;
                    }
                }
            }
        });

        function handlePatchClick(patch) {
            if (state.stamina < GAME_CONFIG.staminaCost) {
                alert("You are exhausted! Sleep in the house or click 'Next Day'.");
                return;
            }

            if (state.currentTool === 'hand') {
                if (patch.status === 'empty') {
                    // Use the specifically purchased seed type
                    const firstSeed = state.inventory.find(i => i && i.count > 0 && (i.id.includes('seeds') || ['parsnip', 'potato', 'cauliflower', 'melon', 'tomato', 'pumpkin'].includes(i.id)));
                    
                    if (firstSeed) {
                        patch.status = 'planted';
                        patch.daysPlanted = 0;
                        patch.crop = { ...firstSeed }; 
                        
                        firstSeed.count--;
                        if (firstSeed.count <= 0) {
                            const idx = state.inventory.indexOf(firstSeed);
                            state.inventory[idx] = null;
                        }
                        
                        playSFX('Plant');
                        state.stamina -= GAME_CONFIG.staminaCost;
                        updateUI();
                        renderInventory(state.isShopOpen ? 'inventory-grid' : 'standalone-inventory-grid');
                    } else {
                        alert("Bạn không có hạt giống nào! Hãy vào shop mua nhé.");
                    }
                } else if (patch.status === 'grown') {
                    // Allow harvesting with hand as well
                    harvestCrop(patch);
                }
            } else if (state.currentTool === 'harvest') {
                if (patch.status === 'grown') {
                    harvestCrop(patch);
                }
            } else if (state.currentTool === 'water') {
                // Play Watering Animation
                updateCursor('water', true);
                playSFX('water_lap2');
                setTimeout(() => {
                    updateCursor('water', false);
                }, 300); // 300ms animation

                if (!patch.isWatered) {
                    // Water the patch
                    patch.isWatered = true;
                    state.stamina -= GAME_CONFIG.staminaCost;
                    updateUI();
                }
            }
        }

        function harvestCrop(patch) {
            playSFX('Harvest');
            state.stamina -= GAME_CONFIG.staminaCost;
            state.money += GAME_CONFIG.harvestReward;

            if (patch.crop.regrowDays) {
                // Regrow logic: back to an earlier stage
                patch.status = 'planted';
                patch.daysPlanted = patch.crop.daysToGrow - patch.crop.regrowDays;
            } else {
                // Single harvest
                patch.status = 'empty';
                patch.daysPlanted = 0;
                patch.crop = null;
                patch.isWatered = false;
            }
            
            updateUI();
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function advanceDay() {
            state.day++;
            state.stamina = state.maxStamina;

            for (let patch of state.patches) {
                if (patch.status === 'planted' && patch.crop) {
                    if (patch.isWatered) {
                        patch.daysPlanted++;
                        
                        // Check if it has reached its full growth days
                        if (patch.daysPlanted >= patch.crop.daysToGrow) {
                            patch.status = 'grown';
                        }
                    }
                }
                
                // Dirt dries out every night
                patch.isWatered = false;
            }
            updateUI();
            closeMenu();
        }

        // ==========================================
        // UI UPDATES
        // ==========================================
        const elDay = document.getElementById('ui-day');
        const elMoney = document.getElementById('ui-money');
        const elStamina = document.getElementById('ui-stamina');
        const elMaxStamina = document.getElementById('ui-max-stamina');
        const menuEl = document.getElementById('house-menu');

        function updateUI() {
            if (elDay) elDay.innerText = state.day;
            if (elStamina) elStamina.innerText = state.stamina;
            if (elMaxStamina) elMaxStamina.innerText = state.maxStamina;
            
            // Render Money Digits (Stardew Style)
            const moneyDigitsContainer = document.getElementById('ui-money-digits');
            if (moneyDigitsContainer) {
                moneyDigitsContainer.innerHTML = '';
                // Luôn tạo ra đúng 8 ô số, căn lề phải bằng cách padStart
                const moneyStr = state.money.toString().padStart(8, ' '); 
                for (let char of moneyStr) {
                    const digitDiv = document.createElement('div');
                    digitDiv.className = 'money-digit';
                    digitDiv.innerText = char === ' ' ? '' : char;
                    moneyDigitsContainer.appendChild(digitDiv);
                }
            }

            const indicator = document.getElementById('scene-indicator');
            if (indicator) indicator.innerText = state.currentScene.toUpperCase();

            const toolbarContainer = document.getElementById('toolbar-container');
            if (toolbarContainer) {
                if (state.currentScene === 'house' || state.currentScene === 'shop') {
                    toolbarContainer.style.display = 'none';
                } else {
                    toolbarContainer.style.display = 'flex';
                }
            }

            if (state.stamina === 0) {
                if (elStamina) elStamina.style.color = '#e74c3c';
            } else {
                if (elStamina) elStamina.style.color = 'inherit';
            }
        }

        function openMenu() {
            state.menuOpen = true;
            menuEl.style.display = 'block';
            mouseX = -1;
        }

        function closeMenu() {
            state.menuOpen = false;
            menuEl.style.display = 'none';
        }

        document.getElementById('next-day-btn').addEventListener('click', advanceDay);

        function confirmSleep() {
            advanceDay();
            state.currentScene = 'farm'; // Quay lại farm sau khi ngủ
            closeMenu();
        }

        // Toolbar Selection Event
        document.querySelectorAll('.tool-slot').forEach(slot => {
            slot.addEventListener('click', (e) => {
                const tool = e.currentTarget.dataset.tool;
                if (!tool) return; // Ignore empty slots

                if (state.currentTool === tool) {
                    // Nếu bấm lại vào công cụ đang chọn -> Bỏ chọn (Deselect)
                    e.currentTarget.classList.remove('selected');
                    state.currentTool = null;
                    updateCursor(null);
                } else {
                    // Nếu bấm công cụ khác -> Chọn công cụ mới
                    document.querySelectorAll('.tool-slot').forEach(s => s.classList.remove('selected'));
                    e.currentTarget.classList.add('selected');
                    state.currentTool = tool;
                    updateCursor(state.currentTool);
                }
            });
        });

        function drawCursorHighlight() {
            if (mouseX === -1 || mouseY === -1 || state.menuOpen) return;
            
            // Draw a subtle highlight at the grid position (16x16)
            const gx = Math.floor(mouseX / 16) * 16;
            const gy = Math.floor(mouseY / 16) * 16;
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(gx, gy, 16, 16);
        }

        // ==========================================
        // RENDER LOOP
        // ==========================================
        function gameLoop(timestamp) {
            updateParticles(); // Update Stardew animations

            // Reset transform and clear with a fallback background color (Stardew Green)
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.fillStyle = '#27ae60'; // Stardew Grass Green
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Apply game scaling
            ctx.scale(GAME_CONFIG.bgScale, GAME_CONFIG.bgScale);
            ctx.imageSmoothingEnabled = false;

            if (state.currentScene === 'farm') {
                if (bgImage.complete && bgImage.naturalHeight !== 0) {
                    ctx.drawImage(bgImage, 0, 0);
                }
                
                // Draw animations (leaves, ripples) over the background
                drawParticles(ctx);

                // Draw Farm Patches
                for (let patch of state.patches) {
                    // Draw Watered Dirt Background
                    if (patch.isWatered && dirtImageLoaded) {
                        for(let r=0; r<3; r++) {
                            for(let c=0; c<3; c++) {
                                let tx = patch.x + c * 16;
                                let ty = patch.y + r * 16;
                                let srcX = 16 + c * 16;
                                let srcY = 64 + r * 16;
                                ctx.drawImage(dirtImage, srcX, srcY, 16, 16, tx, ty, 16, 16);
                            }
                        }
                    }

                    // If planted or grown, draw the 3x3 crops
                    if (patch.status !== 'empty' && patch.crop) {
                        const specificCropImg = getCropImage(patch.crop);
                        
                        // Calculate which growth stage sprite to show
                        let spriteIndex = 0;
                        if (patch.status === 'grown') {
                            spriteIndex = patch.crop.grownIndex;
                        } else {
                            // Automatically distribute all frames over the growth period
                            // This ensures every stage is shown sequentially
                            const progress = patch.daysPlanted / patch.crop.daysToGrow;
                            spriteIndex = Math.floor(progress * patch.crop.grownIndex);
                            spriteIndex = Math.min(spriteIndex, patch.crop.grownIndex - 1);
                        }
                        
                        let cropSpriteX = spriteIndex * 16;
                        let cropRowY = 0; // In individual files, growth stages are in the first row

                        for(let r=0; r<3; r++) {
                            for(let c=0; c<3; c++) {
                                let tx = patch.x + c * 16;
                                let ty = patch.y + r * 16;

                                if (specificCropImg.complete) {
                                    ctx.drawImage(
                                        specificCropImg,
                                        cropSpriteX, cropRowY, 16, 32, // Source
                                        tx, ty - 16, 16, 32            // Destination
                                    );
                                }
                            }
                        }
                    }

                    // Draw Hover Highlight over the entire 3x3 patch
                    if (!state.menuOpen && mouseX >= patch.x && mouseX <= patch.x + patch.width &&
                        mouseY >= patch.y && mouseY <= patch.y + patch.height) {
                        
                        if (placementImageLoaded) {
                            for(let r=0; r<3; r++) {
                                for(let c=0; c<3; c++) {
                                    let tx = patch.x + c * 16;
                                    let ty = patch.y + r * 16;
                                    ctx.drawImage(placementImage, 0, 0, 64, 64, tx, ty, 16, 16);
                                }
                            }
                        } else {
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            ctx.fillRect(patch.x, patch.y, patch.width, patch.height);
                        }
                    }

                    // Draw Growth Progress Text (Debug/Info)
                    if (patch.status !== 'empty') {
                        ctx.font = '10px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillStyle = 'white';
                        ctx.strokeStyle = 'black';
                        ctx.lineWidth = 2;
                        let text = patch.status === 'grown' ? 'RIPE!' : `Day ${patch.daysPlanted}/${patch.crop.daysToGrow}`;
                        ctx.strokeText(text, patch.x + 24, patch.y - 15);
                        ctx.fillText(text, patch.x + 24, patch.y - 15);
                        ctx.textAlign = 'start'; // Reset
                    }
                }

                // Draw House Hover Highlight (Farm)
                const h = GAME_CONFIG.houseOnFarm;
                if (!state.menuOpen && h && mouseX >= h.x && mouseX <= h.x + h.w &&
                    mouseY >= h.y && mouseY <= h.y + h.h) {
                    
                    ctx.fillStyle = 'rgba(241, 196, 15, 0.3)'; 
                    ctx.fillRect(h.x, h.y, h.w, h.h);
                    ctx.strokeStyle = '#f1c40f';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(h.x, h.y, h.w, h.h);
                }
            } else if (state.currentScene === 'town') {
                if (townImageLoaded) {
                    ctx.drawImage(townImage, 0, 0);
                }
                // Highlight Shop on hover
                const shop = GAME_CONFIG.shopOnTown;
                if (!state.menuOpen && mouseX >= shop.x && mouseX <= shop.x + shop.w &&
                    mouseY >= shop.y && mouseY <= shop.y + shop.h) {
                    ctx.fillStyle = 'rgba(241, 196, 15, 0.3)';
                    ctx.fillRect(shop.x, shop.y, shop.w, shop.h);
                }
            } else if (state.currentScene === 'shop') {
                // Centered shop rendering
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, 576, 320);
                
                if (shopImageLoaded) {
                    // Shop.png is 1792x1536
                    const sScale = 0.29; // To hơn
                    const dw = 1792 * sScale;
                    const dh = 1536 * sScale;
                    const dx = (576 - dw) / 2;
                    const dy = (320 - dh) / 2;
                    ctx.drawImage(shopImage, dx, dy, dw, dh);
                    
                    // Exit highlight
                    const exit = GAME_CONFIG.transitions.shopExit;
                    if (!state.menuOpen && mouseX >= exit.x && mouseX <= exit.x + exit.w &&
                        mouseY >= exit.y && mouseY <= exit.y + exit.h) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
                    }
                }
            } else if (state.currentScene === 'house') {
                // Stardew Style: Black background with centered house
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, 576, 320);
                
                if (houseImageLoaded) {
                    // House.webp is large (712x769)
                    const hScale = 0.35; // Quay lại như cũ
                    const dw = 712 * hScale;
                    const dh = 769 * hScale;
                    const dx = (576 - dw) / 2;
                    const dy = (320 - dh) / 2;
                    ctx.drawImage(houseImage, dx, dy, dw, dh);
                    
                    // Exit: door at the bottom
                    // Bed: right bottom area
                    // (Đã xóa đoạn code ghi đè để bạn có thể tự chỉnh trong GAME_CONFIG)

                    // Highlight bed on hover
                    if (!state.menuOpen && mouseX >= GAME_CONFIG.bedInHouse.x && mouseX <= GAME_CONFIG.bedInHouse.x + GAME_CONFIG.bedInHouse.w &&
                        mouseY >= GAME_CONFIG.bedInHouse.y && mouseY <= GAME_CONFIG.bedInHouse.y + GAME_CONFIG.bedInHouse.h) {
                        ctx.fillStyle = 'rgba(241, 196, 15, 0.3)';
                        ctx.fillRect(GAME_CONFIG.bedInHouse.x, GAME_CONFIG.bedInHouse.y, GAME_CONFIG.bedInHouse.w, GAME_CONFIG.bedInHouse.h);
                    }
                    
                    // Highlight exit on hover
                    if (!state.menuOpen && mouseX >= GAME_CONFIG.transitions.houseExit.x && mouseX <= GAME_CONFIG.transitions.houseExit.x + GAME_CONFIG.transitions.houseExit.w &&
                        mouseY >= GAME_CONFIG.transitions.houseExit.y && mouseY <= GAME_CONFIG.transitions.houseExit.y + GAME_CONFIG.transitions.houseExit.h) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(GAME_CONFIG.transitions.houseExit.x, GAME_CONFIG.transitions.houseExit.y, GAME_CONFIG.transitions.houseExit.w, GAME_CONFIG.transitions.houseExit.h);
                    }
                }
            }

            // 3. Draw Player/Cursor Highlight
            drawCursorHighlight();

            requestAnimationFrame(gameLoop);
        }

        updateUI();

    </script>
</body>
</html>
