<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple 2D Farm Game</title>
    <style>
        @font-face {
            font-family: 'StardewValley';
            src: url('assets/fonts/Font/Stardew Valley.ttf') format('truetype');
        }

        body {
            background-color: #111;
            color: #ecf0f1;
            font-family: 'StardewValley', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Hide instructions for full screen mode */
        .instructions {
            display: none;
        }

        #game-container {
            position: relative;
            background-color: #000;
            display: inline-block;
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            /* Disable anti-aliasing to keep pixel art crisp when scaling up */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            cursor: url('assets/Cursor/Normal%20Selects.cur'), auto;
        }

        /* UI overlay styles */
        #ui-bar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through the UI background to the canvas */
            box-sizing: border-box;
        }

        .ui-stat {
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 1px 1px 2px black;
        }

        #next-day-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            background-color: #e67e22;
            color: white;
            border: 2px solid #fff;
            border-radius: 5px;
            cursor: url('assets/Cursor/Normal%20Selects.cur'), pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: background-color 0.2s, transform 0.1s;
            z-index: 5;
        }

        #next-day-btn:hover {
            background-color: #d35400;
        }

        #next-day-btn:active {
            transform: translateY(2px);
        }

        /* House Menu styles */
        #house-menu {
            display: none; /* Hidden by default */
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(44, 62, 80, 0.95);
            padding: 30px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #house-menu h2 {
            margin-top: 0;
            color: #f1c40f;
        }

        #house-menu button {
            display: block;
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: url('assets/Cursor/Normal%20Selects.cur'), pointer;
            transition: background-color 0.2s;
        }

        #house-menu button:hover {
            background-color: #2980b9;
        }

        #house-menu .close-btn {
            background-color: #e74c3c;
        }

        #house-menu .close-btn:hover {
            background-color: #c0392b;
        }

        /* Toolbar using user's Toolbar.png */
        #toolbar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            /* ĐỂ CHỈNH KÍCH THƯỚC: Bạn thay đổi width và height theo cùng một tỷ lệ */
            width: 480px; /* Thu nhỏ từ 640px xuống 480px */
            height: 105px; /* Thu nhỏ từ 140px xuống 105px */
            background-image: url('assets/Toolbar.png');
            background-size: 100% auto;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            /* Đã căn chỉnh lại padding để các ô (slot) bên trong trở thành hình vuông (khoảng 52x52) */
            padding: 24px 31px 27px 31px; 
            box-sizing: border-box;
            z-index: 10;
        }

        .tool-slot {
            flex: 1; /* Automatically spaces the 8 slots evenly */
            height: 100%;
            position: relative;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
            border: none;
        }

        .tool-icon {
            /* Kích thước của icon bên trong (để vừa vặn với ô vuông 52x52 ở trên) */
            width: 48px; 
            height: 48px;
            background-image: url('assets/Tool.png');
            /* Thu nhỏ tỷ lệ scale từ 4x xuống 3x để icon không bị cắt xén (16x16 -> 48x48) */
            /* 336 * 3 = 1008px, 384 * 3 = 1152px */
            background-size: 1008px 1152px; 
            image-rendering: pixelated;
            pointer-events: none; /* Let clicks pass to the slot */
        }

        /* Stardew Red Selection */
        .tool-slot.selected::after {
            content: '';
            position: absolute;
            /* Thay đổi left và right để viền đỏ nhỏ lại, không lấn sang rãnh phân cách */
            top: -1px; left: 3.5px; right: 1.5px; bottom: 1px;
            border: 4px solid #d93c27;
            box-shadow: inset 0 0 4px rgba(0,0,0,0.3);
            border-radius: 4px; /* Bo góc nhẹ cho viền đỏ */
            z-index: 2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="instructions"></div>

    <div id="game-container">
        <!-- Canvas where background and crops are drawn -->
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <!-- UI Elements overlaid on the game -->
        <div id="ui-bar">
            <div class="ui-stat">🗓️ Day: <span id="ui-day">1</span></div>
            <div class="ui-stat">💰 Money: <span id="ui-money">10</span></div>
            <div class="ui-stat">⚡ Stamina: <span id="ui-stamina">10</span>/<span id="ui-max-stamina">10</span></div>
        </div>

        <button id="next-day-btn">Next Day ⏭️</button>

        <!-- House Menu (Hidden by default) -->
        <div id="house-menu">
            <h2>🏠 Home Sweet Home</h2>
            <p>Would you like to sleep and go to the next day?</p>
            <button id="sleep-btn">Sleep (Restore Stamina)</button>
            <button id="close-menu-btn" class="close-btn">Close</button>
        </div>

        <!-- Toolbar using user's Toolbar.png -->
        <div id="toolbar-container">
            <!-- Slot 1: Hand / Seed -->
            <div class="tool-slot selected" data-tool="hand" title="Seed Bag (Plant/Harvest)">
                <div class="tool-icon" style="background-position: 0px 0px;"></div>
            </div>
            <!-- Slot 2: Watering Can -->
            <div class="tool-slot" data-tool="water" title="Watering Can">
                <div class="tool-icon" style="background-image: url('assets/watering.png'); background-position: 0px 0px; background-size: 1440px 960px;"></div>
            </div>
            <!-- 5 Empty Slots (Tổng cộng 7 ô để khớp với hình Toolbar.png) -->
            <div class="tool-slot"></div>
            <div class="tool-slot"></div>
            <div class="tool-slot"></div>
            <div class="tool-slot"></div>
            <div class="tool-slot"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // GAME CONFIGURATION (EASY TO MODIFY)
        // ==========================================
        const GAME_CONFIG = {
            // Asset Paths
            bgImageSrc: 'assets/Farm.png', // Background map image
            cropImageSrc: 'assets/Crops.png', // Image with crops
            
            // Configuration for tools (spritesheet coordinates and source)
            tools: {
                hand: { x: 0, y: 0, sprite: 'assets/Tool.png' },
                waterIdle: { x: 0, y: 0, sprite: 'assets/watering.png' },
                waterAnim: { x: 32, y: 0, sprite: 'assets/watering.png' }
            },
            
            // Rendering Scale will be calculated dynamically to fit screen
            bgScale: 1, 

            // ------------------------------------------
            // 8 DIRT PLOTS (Each is a 3x3 tile area)
            // Coordinates are based on the ORIGINAL map size (16px grid)
            // ------------------------------------------
            plots: [
                { x: 240, y: 128 },
                { x: 304, y: 128 },
                { x: 368, y: 128 },
                { x: 432, y: 128 },
                { x: 240, y: 192 },
                { x: 304, y: 192 },
                { x: 368, y: 192 },
                { x: 432, y: 192 }
            ],

            // ------------------------------------------
            // AVAILABLE CROPS & THEIR GROWTH STAGES
            // daysToGrow maps directly to the number of sprites in Crops.png
            // Day 0 = Seed (x=0), Day 1 = stage 2 (x=16), etc.
            // ------------------------------------------
            crops: [
                { name: 'Parsnip', rowY: 0, daysToGrow: 5 },      // 5 days -> sprites 0, 1, 2, 3, 4, 5
                { name: 'Cauliflower', rowY: 64, daysToGrow: 5 }, // 5 days
                { name: 'Potato', rowY: 96, daysToGrow: 6 },      // 6 days -> sprites 0 to 6
                { name: 'Garlic', rowY: 128, daysToGrow: 5 },     // 5 days
                { name: 'Kale', rowY: 160, daysToGrow: 5 },       // 5 days
                { name: 'Rhubarb', rowY: 192, daysToGrow: 5 },    // 5 days
                { name: 'Melon', rowY: 224, daysToGrow: 6 },      // 6 days
                { name: 'Tomato', rowY: 256, daysToGrow: 6 },     // 6 days
                { name: 'Hot Pepper', rowY: 320, daysToGrow: 5 }  // 5 days
            ],

            // House Area
            house: {
                x: 306,     
                y: 50,      
                width: 100,  
                height: 80  
            },

            // Economy & Game Rules
            harvestReward: 15, // 15 money for a full 3x3 patch
            staminaCost: 1
        };

        // ==========================================
        // GAME STATE
        // ==========================================
        const state = {
            day: 1,
            money: 10,
            stamina: 10,
            maxStamina: 10,
            patches: [], 
            menuOpen: false,
            currentTool: 'hand' // 'hand' or 'water'
        };

        // Initialize the 8 farming patches
        GAME_CONFIG.plots.forEach((pos, index) => {
            state.patches.push({
                id: index,
                x: pos.x,
                y: pos.y,
                width: 48, // 3 tiles * 16px
                height: 48, // 3 tiles * 16px
                status: 'empty', // 'empty' | 'planted' | 'grown'
                daysPlanted: 0,
                isWatered: false,
                crop: null // Will store the selected crop object from GAME_CONFIG.crops
            });
        });

        // ==========================================
        // SETUP CANVAS & ASSETS
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        ctx.imageSmoothingEnabled = false;

        const bgImage = new Image();
        bgImage.src = GAME_CONFIG.bgImageSrc;

        const cropImage = new Image();
        cropImage.src = GAME_CONFIG.cropImageSrc;

        // Load tool sprites globally
        const toolSprites = {};
        ['assets/Tool.png', 'assets/watering.png'].forEach(src => {
            const img = new Image();
            img.src = src;
            toolSprites[src] = img;
        });

        const dirtImage = new Image();
        dirtImage.src = 'assets/Dirt.png';
        let dirtImageLoaded = false;
        dirtImage.onload = () => { dirtImageLoaded = true; };

        // Helper to update cursor based on current tool
        function updateCursor(toolId, isAnimating = false) {
            if (!toolId) {
                // Khôi phục con trỏ chuột bình thường nếu không cầm công cụ
                document.body.style.cursor = '';
                canvas.style.cursor = '';
                return;
            }

            let tx, ty, spriteSrc;
            if (toolId === 'hand') {
                tx = GAME_CONFIG.tools.hand.x;
                ty = GAME_CONFIG.tools.hand.y;
                spriteSrc = GAME_CONFIG.tools.hand.sprite;
            } else if (toolId === 'water') {
                const config = isAnimating ? GAME_CONFIG.tools.waterAnim : GAME_CONFIG.tools.waterIdle;
                tx = config.x;
                ty = config.y;
                spriteSrc = config.sprite;
            }
            const sprite = toolSprites[spriteSrc];
            if (!sprite || !sprite.complete || sprite.naturalHeight === 0) return;

            // Create offscreen canvas for cursor if it doesn't exist
            if (!window.cursorCanvas) {
                window.cursorCanvas = document.createElement('canvas');
                window.cursorCanvas.width = 48; // Scaled cursor size
                window.cursorCanvas.height = 48;
                window.cursorCtx = window.cursorCanvas.getContext('2d');
                window.cursorCtx.imageSmoothingEnabled = false;
            }

            // Clear and draw the 16x16 sprite scaled up
            window.cursorCtx.clearRect(0, 0, 48, 48);
            window.cursorCtx.drawImage(sprite, tx, ty, 16, 16, 0, 0, 48, 48);
            
            const cursorUrl = window.cursorCanvas.toDataURL('image/png');
            document.body.style.cursor = `url('${cursorUrl}') 0 0, auto`;
            canvas.style.cursor = `url('${cursorUrl}') 0 0, auto`;
        }
        
        function resizeGame() {
            if (!bgImage.complete || bgImage.naturalHeight === 0) return;
            
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const imgW = bgImage.width;
            const imgH = bgImage.height;
            
            // Calculate scale to maximize canvas size while fitting in the window
            GAME_CONFIG.bgScale = Math.min(winW / imgW, winH / imgH);
            
            canvas.width = imgW * GAME_CONFIG.bgScale;
            canvas.height = imgH * GAME_CONFIG.bgScale;
            
            // Reapply pixelated settings after resize
            ctx.imageSmoothingEnabled = false;
            ctx.scale(GAME_CONFIG.bgScale, GAME_CONFIG.bgScale);
        }

        bgImage.onload = () => {
            resizeGame();
            window.addEventListener('resize', resizeGame);
            requestAnimationFrame(gameLoop);
        };
        
        bgImage.onerror = () => {
            console.error("Could not load background image: " + GAME_CONFIG.bgImageSrc);
            ctx.fillStyle = '#27ae60'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            requestAnimationFrame(gameLoop);
        };

        let cropImageLoaded = false;
        cropImage.onload = () => { cropImageLoaded = true; };

        const placementImage = new Image();
        placementImage.src = 'assets/placement_tiles.png';
        let placementImageLoaded = false;
        placementImage.onload = () => { placementImageLoaded = true; };

        // ==========================================
        // INPUT HANDLING
        // ==========================================
        let mouseX = -1;
        let mouseY = -1;

        canvas.addEventListener('mousemove', (e) => {
            if (state.menuOpen) return;
            const rect = canvas.getBoundingClientRect();
            mouseX = (e.clientX - rect.left) / GAME_CONFIG.bgScale;
            mouseY = (e.clientY - rect.top) / GAME_CONFIG.bgScale;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1;
            mouseY = -1;
        });

        canvas.addEventListener('click', (e) => {
            if (state.menuOpen) return;

            const rect = canvas.getBoundingClientRect();
            const clickX = (e.clientX - rect.left) / GAME_CONFIG.bgScale;
            const clickY = (e.clientY - rect.top) / GAME_CONFIG.bgScale;

            // Check House Click
            if (clickX >= GAME_CONFIG.house.x && clickX <= GAME_CONFIG.house.x + GAME_CONFIG.house.width &&
                clickY >= GAME_CONFIG.house.y && clickY <= GAME_CONFIG.house.y + GAME_CONFIG.house.height) {
                openMenu();
                return;
            }

            // Check Farm Patch Clicks
            for (let patch of state.patches) {
                if (clickX >= patch.x && clickX <= patch.x + patch.width &&
                    clickY >= patch.y && clickY <= patch.y + patch.height) {
                    handlePatchClick(patch);
                    return;
                }
            }
        });

        function handlePatchClick(patch) {
            if (state.stamina < GAME_CONFIG.staminaCost) {
                alert("You are exhausted! Sleep in the house or click 'Next Day'.");
                return;
            }

            if (state.currentTool === 'hand') {
                if (patch.status === 'empty') {
                    // Plant 3x3 patch
                    patch.status = 'planted';
                    patch.daysPlanted = 0;
                    patch.isWatered = false;
                    
                    // Randomly assign a crop type to this patch
                    const availableCrops = GAME_CONFIG.crops;
                    patch.crop = availableCrops[Math.floor(Math.random() * availableCrops.length)];
                    
                    state.stamina -= GAME_CONFIG.staminaCost;
                    updateUI();
                } else if (patch.status === 'grown') {
                    // Harvest 3x3 patch
                    patch.status = 'empty';
                    patch.daysPlanted = 0;
                    patch.crop = null;
                    patch.isWatered = false;
                    
                    state.stamina -= GAME_CONFIG.staminaCost;
                    state.money += GAME_CONFIG.harvestReward;
                    updateUI();
                }
            } else if (state.currentTool === 'water') {
                // Play Watering Animation
                updateCursor('water', true);
                setTimeout(() => {
                    updateCursor('water', false);
                }, 300); // 300ms animation

                if (!patch.isWatered) {
                    // Water the patch
                    patch.isWatered = true;
                    state.stamina -= GAME_CONFIG.staminaCost;
                    updateUI();
                }
            }
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function advanceDay() {
            state.day++;
            state.stamina = state.maxStamina;

            for (let patch of state.patches) {
                if (patch.status === 'planted' && patch.crop) {
                    if (patch.isWatered) {
                        patch.daysPlanted++;
                        
                        // Check if it has reached its full growth days
                        if (patch.daysPlanted >= patch.crop.daysToGrow) {
                            patch.status = 'grown';
                        }
                    }
                }
                
                // Dirt dries out every night
                patch.isWatered = false;
            }
            updateUI();
            closeMenu();
        }

        // ==========================================
        // UI UPDATES
        // ==========================================
        const elDay = document.getElementById('ui-day');
        const elMoney = document.getElementById('ui-money');
        const elStamina = document.getElementById('ui-stamina');
        const elMaxStamina = document.getElementById('ui-max-stamina');
        const menuEl = document.getElementById('house-menu');

        function updateUI() {
            elDay.innerText = state.day;
            elMoney.innerText = state.money;
            elStamina.innerText = state.stamina;
            elMaxStamina.innerText = state.maxStamina;
            
            if (state.stamina === 0) {
                elStamina.style.color = '#e74c3c';
            } else {
                elStamina.style.color = 'inherit';
            }
        }

        function openMenu() {
            state.menuOpen = true;
            menuEl.style.display = 'block';
            mouseX = -1;
        }

        function closeMenu() {
            state.menuOpen = false;
            menuEl.style.display = 'none';
        }

        document.getElementById('next-day-btn').addEventListener('click', advanceDay);
        document.getElementById('sleep-btn').addEventListener('click', advanceDay);
        document.getElementById('close-menu-btn').addEventListener('click', closeMenu);

        // Toolbar Selection Event
        document.querySelectorAll('.tool-slot').forEach(slot => {
            slot.addEventListener('click', (e) => {
                const tool = e.currentTarget.dataset.tool;
                if (!tool) return; // Ignore empty slots

                if (state.currentTool === tool) {
                    // Nếu bấm lại vào công cụ đang chọn -> Bỏ chọn (Deselect)
                    e.currentTarget.classList.remove('selected');
                    state.currentTool = null;
                    updateCursor(null);
                } else {
                    // Nếu bấm công cụ khác -> Chọn công cụ mới
                    document.querySelectorAll('.tool-slot').forEach(s => s.classList.remove('selected'));
                    e.currentTarget.classList.add('selected');
                    state.currentTool = tool;
                    updateCursor(state.currentTool);
                }
            });
        });

        // ==========================================
        // RENDER LOOP
        // ==========================================
        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width / GAME_CONFIG.bgScale, canvas.height / GAME_CONFIG.bgScale);

            if (bgImage.complete && bgImage.naturalHeight !== 0) {
                ctx.drawImage(bgImage, 0, 0);
            }

            // Draw Farm Patches
            for (let patch of state.patches) {
                
                // Draw Watered Dirt Background
                if (patch.isWatered && dirtImageLoaded) {
                    for(let r=0; r<3; r++) {
                        for(let c=0; c<3; c++) {
                            let tx = patch.x + c * 16;
                            let ty = patch.y + r * 16;
                            // Watered standalone 3x3 patch is at X=16, Y=64 in Dirt.png
                            let srcX = 16 + c * 16;
                            let srcY = 64 + r * 16;
                            ctx.drawImage(dirtImage, srcX, srcY, 16, 16, tx, ty, 16, 16);
                        }
                    }
                }

                // If planted or grown, draw the 3x3 crops
                if (patch.status !== 'empty' && patch.crop) {
                    let cropRowY = patch.crop.rowY;
                    
                    // Calculate which sprite stage to show based on daysPlanted
                    // Cap it at daysToGrow to show the fully grown sprite
                    let spriteStage = Math.min(patch.daysPlanted, patch.crop.daysToGrow);
                    let cropSpriteX = spriteStage * 16;

                    // Draw 3x3 grid of the same crop
                    for(let r=0; r<3; r++) {
                        for(let c=0; c<3; c++) {
                            let tx = patch.x + c * 16;
                            let ty = patch.y + r * 16;

                            if (cropImageLoaded) {
                                // Sprites are 16x32. Draw so the bottom 16x16 aligns with the tile.
                                ctx.drawImage(
                                    cropImage,
                                    cropSpriteX, cropRowY, 16, 32, // Source
                                    tx, ty - 16, 16, 32            // Destination
                                );
                            } else {
                                // Fallback shapes
                                ctx.fillStyle = patch.status === 'planted' ? '#2ecc71' : '#f1c40f';
                                ctx.beginPath();
                                ctx.arc(tx + 8, ty + 8, 6, 0, Math.PI * 2);
                                ctx.fill();
                            }
                        }
                    }
                }

                // Draw Hover Highlight over the entire 3x3 patch
                if (!state.menuOpen && mouseX >= patch.x && mouseX <= patch.x + patch.width &&
                    mouseY >= patch.y && mouseY <= patch.y + patch.height) {
                    
                    if (placementImageLoaded) {
                        for(let r=0; r<3; r++) {
                            for(let c=0; c<3; c++) {
                                let tx = patch.x + c * 16;
                                let ty = patch.y + r * 16;
                                // The valid green tile is the first 64x64 sprite (x=0, y=0)
                                ctx.drawImage(placementImage, 0, 0, 64, 64, tx, ty, 16, 16);
                            }
                        }
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                        ctx.fillRect(patch.x, patch.y, patch.width, patch.height);
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(patch.x, patch.y, patch.width, patch.height);
                    }
                }
            }

            // Draw House Hover Highlight
            if (!state.menuOpen && mouseX >= GAME_CONFIG.house.x && mouseX <= GAME_CONFIG.house.x + GAME_CONFIG.house.width &&
                mouseY >= GAME_CONFIG.house.y && mouseY <= GAME_CONFIG.house.y + GAME_CONFIG.house.height) {
                
                ctx.fillStyle = 'rgba(241, 196, 15, 0.3)'; 
                ctx.fillRect(GAME_CONFIG.house.x, GAME_CONFIG.house.y, GAME_CONFIG.house.width, GAME_CONFIG.house.height);
                ctx.strokeStyle = '#f1c40f';
                ctx.lineWidth = 1;
                ctx.strokeRect(GAME_CONFIG.house.x, GAME_CONFIG.house.y, GAME_CONFIG.house.width, GAME_CONFIG.house.height);
            }

            requestAnimationFrame(gameLoop);
        }

        updateUI();

    </script>
</body>
</html>
