<!DOCTYPE html>
<html>
<body>
    <div id="results"></div>
    <script>
        const crops = [
            'Parsnip.png', 'cauliflower.png', 'potato.png', 'melon.png', 'tomato.png', 'pumpkin.png'
        ];
        
        async function analyze() {
            const results = document.getElementById('results');
            for (const name of crops) {
                const img = new Image();
                img.src = '../assets/Crops/' + name;
                await new Promise(r => img.onload = r);
                
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const data = ctx.getImageData(0, 0, img.width, img.height).data;
                let firstRow = -1;
                for (let y = 0; y < img.height; y++) {
                    for (let x = 0; x < img.width; x++) {
                        if (data[(y * img.width + x) * 4 + 3] > 0) {
                            firstRow = Math.floor(y / 32) * 32;
                            break;
                        }
                    }
                    if (firstRow !== -1) break;
                }
                
                const p = document.createElement('p');
                p.textContent = `${name}: First non-empty row at ${firstRow}`;
                results.appendChild(p);
            }
        }
        analyze();
    </script>
</body>
</html>
